<!doctype html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>4TMS · Financiero</title>
<style>
:root{--navy:#22255A;--must:#D8A828;--green:#6FA52C;--red:#c0392b;--ink:#20232e;--mut:#6b7280;--line:#e3e6ef;--bg:#f4f5f9}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45}
header{background:var(--navy);color:#fff;padding:12px 18px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:20}
header .logo{font-weight:bold;font-size:18px}header .logo span{color:var(--must)}
header .who{margin-left:auto;font-size:12px;color:#c7cbe0;display:flex;align-items:center;gap:10px}
.tabs{background:#fff;border-bottom:1px solid var(--line);display:flex;gap:2px;padding:0 12px;position:sticky;top:48px;z-index:19;overflow-x:auto}
.tabs button{border:none;background:none;padding:12px 14px;font-size:14px;color:var(--mut);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap}
.tabs button.on{color:var(--navy);font-weight:bold;border-bottom-color:var(--must)}
.main{max-width:1120px;margin:0 auto;padding:16px}
.card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;box-shadow:0 4px 14px rgba(20,22,40,.04);margin-bottom:14px}
.bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.search{flex:1;min-width:160px;border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-size:14px}
select,input{border:1px solid var(--line);border-radius:8px;padding:9px 10px;font-size:14px;font-family:inherit;background:#fff}
table{width:100%;border-collapse:collapse}
th,td{text-align:left;padding:8px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:middle}
th{color:var(--mut);font-weight:bold;font-size:11px;text-transform:uppercase;letter-spacing:.03em}
td.r,th.r{text-align:right}
.btn{background:var(--navy);color:#fff;border:none;border-radius:8px;padding:9px 13px;font-size:13px;font-weight:bold;cursor:pointer}
.btn.g{background:var(--green)}.btn.ghost{background:#eef0f7;color:var(--navy)}.btn.sm{padding:6px 9px;font-size:12px}
.empty{color:var(--mut);text-align:center;padding:22px}
.muted{color:var(--mut)}.hint{font-size:12px;color:var(--mut)}
.neg{color:var(--red)}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;color:#fff}
.badge{display:inline-block;padding:2px 7px;border-radius:6px;font-size:11px;background:#eef0f7;color:var(--navy);font-weight:600}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
@media(max-width:720px){.kpis{grid-template-columns:1fr 1fr}}
.kpi{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px}
.kpi .l{font-size:11px;color:var(--mut)}.kpi .v{font-size:19px;font-weight:bold;color:var(--navy)}
.kpi.g{border-left:4px solid var(--green)}.kpi.m{border-left:4px solid var(--must)}.kpi.n{border-left:4px solid var(--navy)}.kpi.r{border-left:4px solid var(--red)}
.sec{font-weight:bold;color:var(--navy);margin:16px 0 8px;font-size:13px;text-transform:uppercase;letter-spacing:.03em}
.tog{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.tog button{padding:6px 12px;border:0;cursor:pointer;background:#fff;color:var(--ink);font-weight:700;font-size:12px}
.tog button.on{background:var(--navy);color:#fff}
.login{max-width:360px;margin:60px auto;padding:26px}
.login h2{color:var(--navy);margin-bottom:4px}
</style></head>

function el(id){return document.getElementById(id);}
function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fix(s){if(s==null)return '';return String(s).replace(/\s+/g,' ').trim();}
function esc2(s){return esc(fix(s));}
function today(){return new Date().toISOString().slice(0,10);}
function M(v){var n=Math.round(Number(v)||0);var s=n<0?'-':'';return s+'$'+Math.abs(n).toLocaleString('es-CL');}
function ecolor(n){var e=EJEC.find(function(x){return x.nombre===n;});return e&&e.color?e.color:'#8a8f9c';}
function tlbl(t){return {factura:'Factura',nc:'N. Crédito',exenta:'Exenta',nd:'N. Débito'}[t]||t;}

/* valor con signo: neto o con IVA */
function vNeto(f){return (Number(f.neto)||0)*(Number(f.signo)||1);}
function vBruto(f){return (Number(f.monto_total)||0)*(Number(f.signo)||1);}
function val(f){return IVA?vBruto(f):vNeto(f);}

/* ---------- AUTH ---------- */
function loginView(){
 el('root').innerHTML='<div class="card login"><h2>4TMS · Financiero</h2><div class="hint" style="margin-bottom:14px">Acceso de dirección.</div>'

async function doLogin(){var m=el('lg_msg');m.textContent='';var r=await sb.auth.signInWithPassword({email:(el('lg_mail').value||'').trim(),password:el('lg_pass').value||''});if(r.error){m.textContent='No pudimos entrar: '+r.error.message;return;}await boot();}
async function logout(){await sb.auth.signOut();location.reload();}
var BACKUP_APP='finanzas';var BACKUP_LABEL='Financiero';var BACKUP_TABLES=['facturas','gastos','proyectos','ejecutivos'];var BACKUP_FILES=[];
/* ===================== RESPALDO 4TMS ===================== */
function _stampB(){var d=new Date();function p(n){return (n<10?'0':'')+n;}return d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())+'-'+p(d.getHours())+p(d.getMinutes());}
function _bajarB(nombre,contenido,tipo){var blob=(contenido instanceof Blob)?contenido:new Blob([contenido],{type:tipo||'application/octet-stream'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=nombre;a.click();setTimeout(function(){URL.revokeObjectURL(a.href);},5000);}
async function _dumpTablaB(t){var rows=[],from=0,P=1000;while(true){var r=await sb.from(t).select('*').range(from,from+P-1);if(r.error)return {__error:r.error.message};var d=r.data||[];rows=rows.concat(d);if(d.length<P)break;from+=P;}return rows;}
async function exportarRespaldoDatos(btn){
 if(typeof IS_ADMIN!=='undefined'&&!IS_ADMIN){alert('Solo el administrador puede exportar el respaldo.');return;}
 var lbl=btn?btn.textContent:'';if(btn)btn.disabled=true;
 try{var out={_app:BACKUP_APP,_fecha:new Date().toISOString(),tablas:{}};var res=[];
  for(var i=0;i<BACKUP_TABLES.length;i++){var t=BACKUP_TABLES[i];if(btn)btn.textContent='Respaldando '+t+'…';var data=await _dumpTablaB(t);out.tablas[t]=data;res.push(t+': '+((data&&data.__error)?('ERROR '+data.__error):(data.length+' filas')));}
  _bajarB('respaldo-'+BACKUP_APP+'-'+_stampB()+'.json',JSON.stringify(out),'application/json');
  alert('Respaldo de datos listo.\n\n'+res.join('\n'));
 }catch(e){alert('Error en el respaldo: '+(e.message||e));}
 finally{if(btn){btn.disabled=false;btn.textContent=lbl||'Bajar datos (JSON)';}}
}
async function exportarArchivos(btn){
 if(typeof IS_ADMIN!=='undefined'&&!IS_ADMIN){alert('Solo el administrador puede exportar los archivos.');return;}
 if(!BACKUP_FILES.length){alert('Esta app no tiene archivos para respaldar.');return;}
 if(typeof JSZip==='undefined'){alert('No cargó la librería de compresión. Recarga e intenta de nuevo.');return;}
 var lbl=btn?btn.textContent:'';if(btn)btn.disabled=true;
 try{var zip=new JSZip();var items=[];
  for(var c=0;c<BACKUP_FILES.length;c++){var cfg=BACKUP_FILES[c];var rows=await _dumpTablaB(cfg.table);if(Array.isArray(rows))rows.forEach(function(r){if(r[cfg.col])items.push({bucket:cfg.bucket,path:r[cfg.col],folder:cfg.folder});});}
  if(!items.length){alert('No hay archivos para respaldar.');return;}
  var ok=0,fail=0;
  for(var i=0;i<items.length;i++){var it=items[i];if(btn)btn.textContent='Bajando '+(i+1)+'/'+items.length+'…';try{var r=await sb.storage.from(it.bucket).download(it.path);if(r.error||!r.data){fail++;continue;}zip.file(it.folder+'/'+it.path.replace(/\//g,'__'),r.data);ok++;}catch(e){fail++;}}
  if(btn)btn.textContent='Comprimiendo…';var blob=await zip.generateAsync({type:'blob'});
  _bajarB('respaldo-archivos-'+BACKUP_APP+'-'+_stampB()+'.zip',blob);
  alert('Archivos respaldados: '+ok+' ok'+(fail?(', '+fail+' no se pudieron bajar'):'')+'.');
 }catch(e){alert('Error al respaldar archivos: '+(e.message||e));}
 finally{if(btn){btn.disabled=false;btn.textContent=lbl||'Bajar archivos (ZIP)';}}
}
function abrirRespaldo(){
 if(typeof IS_ADMIN!=='undefined'&&!IS_ADMIN){alert('Solo el administrador puede respaldar.');return;}
 var ov=document.getElementById('__bkpov');
 if(!ov){ov=document.createElement('div');ov.id='__bkpov';ov.style.cssText='position:fixed;inset:0;z-index:2147483000;background:rgba(10,12,30,.55);display:flex;align-items:center;justify-content:center;font-family:Arial,Helvetica,sans-serif';document.body.appendChild(ov);}
 var filesBtn=BACKUP_FILES.length?'<button id="__bkpf" style="background:#6FA52C;color:#fff;border:0;border-radius:8px;padding:10px 14px;font-weight:bold;cursor:pointer">Bajar archivos (ZIP)</button>':'';
 ov.innerHTML='<div style="background:#fff;border-radius:14px;padding:24px 26px;width:400px;max-width:92vw;box-shadow:0 14px 44px rgba(0,0,0,.35)"><div style="font-size:18px;font-weight:bold;color:#22255A;margin-bottom:6px">Respaldo \u00b7 '+BACKUP_LABEL+'</div><div style="font-size:13px;color:#555;margin-bottom:14px">Baja tu copia antes de cada cambio. Los <b>datos</b> van en un JSON'+(BACKUP_FILES.length?'. Los <b>archivos</b> van aparte en un ZIP':'')+'.</div><div style="display:flex;flex-direction:column;gap:8px"><button id="__bkpd" style="background:#22255A;color:#fff;border:0;border-radius:8px;padding:10px 14px;font-weight:bold;cursor:pointer">Bajar datos (JSON)</button>'+filesBtn+'</div><div style="text-align:right;margin-top:14px"><button id="__bkpx" style="background:#eee;color:#333;border:0;border-radius:8px;padding:8px 14px;cursor:pointer">Cerrar</button></div></div>';
 ov.style.display='flex';
 document.getElementById('__bkpd').onclick=function(){exportarRespaldoDatos(this);};
 if(document.getElementById('__bkpf'))document.getElementById('__bkpf').onclick=function(){exportarArchivos(this);};
 document.getElementById('__bkpx').onclick=function(){ov.style.display='none';};
}

async function loadEjec(){try{var r=await sb.from('ejecutivos').select('*').order('nombre');EJEC=r.data||[];}catch(e){EJEC=[];}}

async function boot(){
 var s=await sb.auth.getSession();SESSION=s.data.session?s.data.session.user:null;
 if(!SESSION){loginView();return;}
 await loadEjec();
 var me=EJEC.find(function(e){return (e.email||'').toLowerCase()===(SESSION.email||'').toLowerCase();});
 IS_ADMIN=(me&&me.admin===true)||(SESSION.email||'').toLowerCase()===OWNER_EMAIL;
 if(!IS_ADMIN){el('root').innerHTML='<div class="card login"><h2>Acceso restringido</h2><div class="hint" style="margin:10px 0">Financiero es de dirección. Tu cuenta no tiene acceso.</div><button class="btn ghost" onclick="logout()">Salir</button></div>';return;}

 shell();
}

function renderTabs(){

function render(){
 if(TAB==='libro')return renderLibro();
 if(TAB==='cobranza')return renderCobranza();

}
function ivaTog(){return '<span class="tog"><button class="'+(!IVA?'on':'')+'" onclick="IVA=false;render()">Neto</button><button class="'+(IVA?'on':'')+'" onclick="IVA=true;render()">Con IVA</button></span>';}
function yrSel(anios){return '<select onchange="YR=this.value;render()"><option value="">Todos los años</option>'+anios.map(function(a){return '<option'+(String(YR)===String(a)?' selected':'')+'>'+a+'</option>';}).join('')+'</select>';}
function proyName(id){var p=PROY.find(function(x){return String(x.id)===String(id);});return p?(fix(p.cliente)+' · '+fix(p.cargo)):'';}

/* ---------- LIBRO ---------- */
var LQ='',LT='';
async function renderLibro(){
 el('app').innerHTML='<div class="empty">Cargando libro…</div>';
 try{
  var r=await sb.from('facturas').select('*');var all=r.data||[];
  var anios=[].concat(all.map(function(f){return f.anio;})).filter(function(v,i,a){return v&&a.indexOf(v)===i;}).sort();
  if(!YR&&anios.length)YR=String(anios[anios.length-1]);
  var yfx=all.filter(function(f){return !YR||String(f.anio)===String(YR);});
  var list=yfx.filter(function(f){return (!LT||f.tipo===LT)&&(!LQ||fix(f.cliente).toLowerCase().indexOf(LQ.toLowerCase())>=0||String(f.folio).indexOf(LQ)>=0);});
  list.sort(function(a,b){return String(b.fecha||'').localeCompare(String(a.fecha||''));});

  var facturado=yfx.reduce(function(s,f){return s+val(f);},0);
  var ncTot=yfx.filter(function(f){return f.tipo==='nc';}).reduce(function(s,f){return s+Math.abs(val(f));},0);
  var nFac=yfx.filter(function(f){return f.tipo==='factura'||f.tipo==='exenta';}).length;
  var nCli=(new Set(yfx.map(function(f){return f.cliente;}))).size;

  var h='<div class="bar">'+ivaTog()+yrSel(anios)
   +'<select onchange="LT=this.value;render()"><option value="">Todo tipo</option><option value="factura"'+(LT==='factura'?' selected':'')+'>Facturas</option><option value="nc"'+(LT==='nc'?' selected':'')+'>Notas de crédito</option><option value="exenta"'+(LT==='exenta'?' selected':'')+'>Exentas</option><option value="nd"'+(LT==='nd'?' selected':'')+'>N. Débito</option></select>'
   +'<input class="search" placeholder="Cliente o folio…" value="'+esc(LQ)+'" oninput="LQ=this.value;render()"></div>';
  h+='<div class="kpis"><div class="kpi g"><div class="l">Facturado '+(YR||'total')+' ('+(IVA?'con IVA':'neto')+')</div><div class="v">'+M(facturado)+'</div></div>'
   +'<div class="kpi r"><div class="l">Notas de crédito</div><div class="v">'+M(ncTot)+'</div></div>'
   +'<div class="kpi n"><div class="l">Facturas</div><div class="v">'+nFac+'</div></div>'
   +'<div class="kpi m"><div class="l">Clientes</div><div class="v">'+nCli+'</div></div></div>';

  // rollup por cliente
  var byc={};yfx.forEach(function(f){var k=f.cliente||'—';(byc[k]=byc[k]||{fac:0,nc:0});byc[k].fac+=val(f);if(f.tipo==='nc')byc[k].nc+=Math.abs(val(f));});
  var cli=Object.keys(byc).map(function(k){return {k:k,fac:byc[k].fac,nc:byc[k].nc};}).sort(function(a,b){return b.fac-a.fac;});
  h+='<div class="sec">Facturado por cliente · '+(YR||'total')+'</div><div class="card"><table><thead><tr><th>Cliente</th><th class="r">Neto</th><th class="r">NC</th></tr></thead><tbody>';
  cli.slice(0,25).forEach(function(c){h+='<tr><td><b>'+esc2(c.k)+'</b></td><td class="r">'+M(c.fac)+'</td><td class="r '+(c.nc?'neg':'')+'">'+(c.nc?'-'+M(c.nc):'—')+'</td></tr>';});
  h+='</tbody></table></div>';

  // detalle
  h+='<div class="sec">Detalle ('+list.length+' documentos)</div><div class="card"><table><thead><tr><th>Fecha</th><th>Folio</th><th>Cliente</th><th>Línea</th><th>Tipo</th><th class="r">'+(IVA?'Con IVA':'Neto')+'</th><th>Proyecto</th></tr></thead><tbody>';
  if(!list.length)h+='<tr><td colspan=7 class="empty">Sin documentos.</td></tr>';
  list.slice(0,400).forEach(function(f){
   var neg=f.tipo==='nc';
   h+='<tr><td class="muted">'+esc(String(f.fecha||'').slice(0,10))+'</td><td>'+esc(f.folio||'')+'</td><td><b>'+esc2(f.cliente)+'</b></td><td>'+(f.linea?'<span class="badge">'+esc(f.linea)+'</span>':'')+'</td>'
    +'<td>'+(neg?'<span class="tag" style="background:#7a5cff">NC</span>':esc(tlbl(f.tipo)))+'</td>'
    +'<td class="r '+(neg?'neg':'')+'">'+M(val(f))+'</td>'
    +'<td><select onchange="asignarFactProy(\''+esc(f.id)+'\',this.value)" style="max-width:180px"><option value="">—</option>'+PROY.map(function(p){return '<option value="'+p.id+'"'+(String(f.proyecto_id)===String(p.id)?' selected':'')+'>'+esc2(p.cliente)+' · '+esc2(p.cargo)+'</option>';}).join('')+'</select></td></tr>';
  });
  h+='</tbody></table>'+(list.length>400?'<div class="hint">Mostrando 400 de '+list.length+'. Filtra por año/tipo para acotar.</div>':'')+'</div>';
  el('app').innerHTML=h;
 }catch(e){el('app').innerHTML='<div class="card"><div class="empty neg">Error: '+esc(e.message||e)+'</div></div>';}
}
async function asignarFactProy(id,pid){try{await sb.from('facturas').update({proyecto_id:pid?parseInt(pid):null}).eq('id',id);}catch(e){alert('No se pudo asignar: '+(e.message||e));}}

/* ---------- COBRANZA ---------- */
var CE='por_cobrar';
async function renderCobranza(){
 el('app').innerHTML='<div class="empty">Cargando cobranza…</div>';
 try{
  var all=(await sb.from('facturas').select('*')).data||[];
  var docs=all.filter(function(f){return f.tipo==='factura'||f.tipo==='exenta';}); // cobranza sobre facturas
  var yfx=docs.filter(function(f){return !YR||String(f.anio)===String(YR);});
  var anios=[].concat(all.map(function(f){return f.anio;})).filter(function(v,i,a){return v&&a.indexOf(v)===i;}).sort();
  var suma=function(a){return a.reduce(function(s,f){return s+(Number(f.monto_total)||0);},0);};
  var cobrado=yfx.filter(function(f){return f.estado_pago==='cobrado';});
  var porc=yfx.filter(function(f){return f.estado_pago==='por_cobrar';});
  var venc=yfx.filter(function(f){return f.estado_pago==='vencida';});

  var h='<div class="bar">'+yrSel(anios)+'</div>';
  h+='<div class="hint" style="margin-bottom:8px">El estado de pago no venía en el respaldo (salía de Duemint/Itaú). Todas parten como <b>por cobrar</b>; márcalas cobradas a medida que concilias, o subimos la cartola Itaú para automatizarlo.</div>';
  h+='<div class="kpis"><div class="kpi g"><div class="l">Cobrado (con IVA)</div><div class="v">'+M(suma(cobrado))+'</div></div>'
   +'<div class="kpi m"><div class="l">Por cobrar</div><div class="v">'+M(suma(porc))+'</div></div>'
   +'<div class="kpi r"><div class="l">Vencido</div><div class="v">'+M(suma(venc))+'</div></div>'
   +'<div class="kpi n"><div class="l">Documentos</div><div class="v">'+yfx.length+'</div></div></div>';

  // aging de por cobrar
  var band={a:0,b:0,c:0,d:0};var now=new Date();
  porc.concat(venc).forEach(function(f){var dias=Math.round((now-new Date(f.fecha))/86400000);var m=Number(f.monto_total)||0;if(dias<=30)band.a+=m;else if(dias<=60)band.b+=m;else if(dias<=90)band.c+=m;else band.d+=m;});
  h+='<div class="sec">Antigüedad de lo pendiente</div><div class="card"><table><thead><tr><th>Tramo</th><th class="r">Monto</th></tr></thead><tbody>'
   +'<tr><td>0–30 días</td><td class="r">'+M(band.a)+'</td></tr><tr><td>31–60 días</td><td class="r">'+M(band.b)+'</td></tr>'
   +'<tr><td>61–90 días</td><td class="r">'+M(band.c)+'</td></tr><tr><td class="neg">+90 días</td><td class="r neg">'+M(band.d)+'</td></tr></tbody></table></div>';

  // tabla marcable
  var filtro=yfx.filter(function(f){return f.estado_pago===CE;}).sort(function(a,b){return String(a.fecha||'').localeCompare(String(b.fecha||''));});
  h+='<div class="bar"><span class="hint">Ver:</span><span class="tog"><button class="'+(CE==='por_cobrar'?'on':'')+'" onclick="CE=\'por_cobrar\';render()">Por cobrar</button><button class="'+(CE==='cobrado'?'on':'')+'" onclick="CE=\'cobrado\';render()">Cobradas</button><button class="'+(CE==='vencida'?'on':'')+'" onclick="CE=\'vencida\';render()">Vencidas</button></span></div>';
  h+='<div class="card"><table><thead><tr><th>Fecha</th><th>Folio</th><th>Cliente</th><th class="r">Con IVA</th><th>Marcar</th></tr></thead><tbody>';
  if(!filtro.length)h+='<tr><td colspan=5 class="empty">Sin documentos en este estado.</td></tr>';
  filtro.slice(0,300).forEach(function(f){
   h+='<tr><td class="muted">'+esc(String(f.fecha||'').slice(0,10))+'</td><td>'+esc(f.folio||'')+'</td><td><b>'+esc2(f.cliente)+'</b></td><td class="r">'+M(f.monto_total)+'</td>'
    +'<td><select onchange="marcarPago(\''+esc(f.id)+'\',this.value)"><option value="por_cobrar"'+(f.estado_pago==='por_cobrar'?' selected':'')+'>Por cobrar</option><option value="cobrado"'+(f.estado_pago==='cobrado'?' selected':'')+'>Cobrada</option><option value="vencida"'+(f.estado_pago==='vencida'?' selected':'')+'>Vencida</option></select></td></tr>';
  });
  h+='</tbody></table></div>';
  el('app').innerHTML=h;
 }catch(e){el('app').innerHTML='<div class="card"><div class="empty neg">Error: '+esc(e.message||e)+'</div></div>';}
}
async function marcarPago(id,estado){try{var u={estado_pago:estado};if(estado==='cobrado')u.fecha_pago=today();await sb.from('facturas').update(u).eq('id',id);render();}catch(e){alert(e.message||e);}}

/* ---------- RESULTADOS / MÁRGENES ---------- */
async function renderResultados(){
 el('app').innerHTML='<div class="empty">Cargando resultados…</div>';
 try{
  var all=(await sb.from('facturas').select('*')).data||[];
  var gas=(await sb.from('gastos').select('*')).data||[];
  var anios=[].concat(all.map(function(f){return f.anio;})).filter(function(v,i,a){return v&&a.indexOf(v)===i;}).sort();
  if(!YR&&anios.length)YR=String(anios[anios.length-1]);
  var yfx=all.filter(function(f){return (!YR||String(f.anio)===String(YR));});
  var ingreso=yfx.reduce(function(s,f){return s+vNeto(f);},0);
  var gastoAnual=gas.filter(function(g){return !YR||String(g.fecha||'').slice(0,4)===String(YR);}).reduce(function(s,g){return s+(Number(g.monto)||0);},0);
  var costoCons=ingreso*COSTO_RATE;
  var margen=ingreso-costoCons-gastoAnual;

  var h='<div class="bar">'+yrSel(anios)+'<span class="hint">Costo consultor:</span><input type="number" value="'+(COSTO_RATE*100)+'" style="width:70px" onchange="COSTO_RATE=(parseFloat(this.value)||0)/100;render()"><span class="hint">% del neto (ajustable)</span></div>';
  h+='<div class="kpis"><div class="kpi g"><div class="l">Ingreso neto '+(YR||'total')+'</div><div class="v">'+M(ingreso)+'</div></div>'
   +'<div class="kpi m"><div class="l">Costo consultor ('+(COSTO_RATE*100)+'%)</div><div class="v">'+M(costoCons)+'</div></div>'
   +'<div class="kpi r"><div class="l">Gastos</div><div class="v">'+M(gastoAnual)+'</div></div>'
   +'<div class="kpi n"><div class="l">Margen</div><div class="v">'+M(margen)+'</div></div></div>';

  // por línea
  var byl={};yfx.forEach(function(f){var k=f.linea||'(sin línea)';byl[k]=(byl[k]||0)+vNeto(f);});
  h+='<div class="sec">Ingreso por línea</div><div class="card"><table><thead><tr><th>Línea</th><th class="r">Neto</th><th class="r">% del total</th></tr></thead><tbody>';
  Object.keys(byl).sort(function(a,b){return byl[b]-byl[a];}).forEach(function(k){h+='<tr><td><b>'+esc(k)+'</b></td><td class="r">'+M(byl[k])+'</td><td class="r">'+(ingreso?Math.round(byl[k]/ingreso*100):0)+'%</td></tr>';});
  h+='</tbody></table></div>';

  // por cliente con margen
  var byc={};yfx.forEach(function(f){var k=f.cliente||'—';byc[k]=(byc[k]||0)+vNeto(f);});
  var cli=Object.keys(byc).map(function(k){return {k:k,ing:byc[k]};}).sort(function(a,b){return b.ing-a.ing;});
  h+='<div class="sec">Margen por cliente (ingreso − costo consultor)</div><div class="card"><table><thead><tr><th>Cliente</th><th class="r">Ingreso</th><th class="r">Costo cons.</th><th class="r">Margen</th></tr></thead><tbody>';
  cli.slice(0,25).forEach(function(c){var cc=c.ing*COSTO_RATE;var mg=c.ing-cc;h+='<tr><td><b>'+esc2(c.k)+'</b></td><td class="r">'+M(c.ing)+'</td><td class="r">'+M(cc)+'</td><td class="r'+(mg<0?' neg':'')+'">'+M(mg)+'</td></tr>';});
  h+='</tbody></table><div class="hint" style="margin-top:6px">Los gastos recurrentes/prorrateables se ven en la pestaña Gastos; acá el margen es ingreso menos costo de consultores.</div></div>';

  // por proyecto (facturas vinculadas)
  var byp={};yfx.forEach(function(f){if(f.proyecto_id){byp[f.proyecto_id]=(byp[f.proyecto_id]||0)+vNeto(f);}});
  var keys=Object.keys(byp);
  h+='<div class="sec">Ingreso por proyecto (facturas vinculadas)</div><div class="card">';
  if(!keys.length)h+='<div class="empty">Aún no hay facturas vinculadas a proyectos. Vincula en el Libro (columna Proyecto) para ver ticket y margen por proyecto.</div>';
  else{h+='<table><thead><tr><th>Proyecto</th><th class="r">Ingreso</th><th class="r">Margen</th></tr></thead><tbody>';
   keys.map(function(k){return {k:k,ing:byp[k]};}).sort(function(a,b){return b.ing-a.ing;}).forEach(function(x){var mg=x.ing*(1-COSTO_RATE);h+='<tr><td><b>'+esc2(proyName(x.k)||('#'+x.k))+'</b></td><td class="r">'+M(x.ing)+'</td><td class="r">'+M(mg)+'</td></tr>';});
   h+='</tbody></table>';}
  h+='</div>';
  el('app').innerHTML=h;
 }catch(e){el('app').innerHTML='<div class="card"><div class="empty neg">Error: '+esc(e.message||e)+'</div></div>';}
}

/* ---------- GASTOS ---------- */
async function renderGastos(){
 el('app').innerHTML='<div class="empty">Cargando gastos…</div>';
 try{
  var gas=(await sb.from('gastos').select('*').order('fecha',{ascending:false})).data||[];
  var recur=gas.filter(function(g){return g.recurrente;});
  var mensualRec=recur.reduce(function(s,g){return s+(Number(g.monto)||0);},0);
  var totalAnual=gas.reduce(function(s,g){return s+(Number(g.monto)||0);},0);
  var pror=gas.filter(function(g){return g.prorrateo;}).reduce(function(s,g){return s+(Number(g.monto)||0);},0);

  var h='<div class="bar"><button class="btn g sm" onclick="nuevoGasto()">+ Gasto</button></div>';
  h+='<div class="kpis"><div class="kpi n"><div class="l">Gasto registrado</div><div class="v">'+M(totalAnual)+'</div></div>'
   +'<div class="kpi m"><div class="l">Recurrente mensual</div><div class="v">'+M(mensualRec)+'</div></div>'
   +'<div class="kpi g"><div class="l">Recurrente anual</div><div class="v">'+M(mensualRec*12)+'</div></div>'
   +'<div class="kpi"><div class="l">Prorrateable</div><div class="v">'+M(pror)+'</div></div></div>';
  h+='<div class="card"><table><thead><tr><th>Fecha</th><th>Proveedor</th><th>Tipo</th><th>Glosa</th><th class="r">Monto</th><th>Recurrente</th></tr></thead><tbody>';
  if(!gas.length)h+='<tr><td colspan=6 class="empty">Sin gastos.</td></tr>';
  gas.forEach(function(g){h+='<tr><td class="muted">'+esc(String(g.fecha||'').slice(0,10))+'</td><td><b>'+esc2(g.proveedor)+'</b></td><td>'+esc(g.tipo||'')+'</td><td class="muted">'+esc2(g.glosa)+'</td><td class="r">'+M(g.monto)+'</td><td>'+(g.recurrente?'<span class="badge">mensual</span>':'')+(g.prorrateo?' <span class="badge">prorrateo</span>':'')+'</td></tr>';});
  h+='</tbody></table></div>';
  el('app').innerHTML=h;
 }catch(e){el('app').innerHTML='<div class="card"><div class="empty neg">Error: '+esc(e.message||e)+'</div></div>';}
}
function nuevoGasto(){
 var h='<div class="card" style="max-width:520px;margin:0 auto"><div class="sec" style="margin-top:0">Nuevo gasto</div>'
  +'<div class="bar"><input id="ng_prov" placeholder="Proveedor" style="flex:1"><input id="ng_tipo" placeholder="Tipo" style="width:140px"></div>'
  +'<div class="bar"><input id="ng_glosa" placeholder="Glosa" style="flex:1"><input id="ng_monto" type="number" placeholder="Monto" style="width:140px"></div>'
  +'<div class="bar"><input id="ng_fecha" type="date" value="'+today()+'"><label class="hint"><input type="checkbox" id="ng_rec" style="width:auto"> Recurrente</label><label class="hint"><input type="checkbox" id="ng_pro" style="width:auto"> Prorrateo</label></div>'
  +'<div style="text-align:right"><button class="btn ghost sm" onclick="render()">Cancelar</button> <button class="btn sm" onclick="saveGasto()">Guardar</button></div></div>';

}
async function saveGasto(){
 var row={id:'G'+Date.now(),proveedor:fix(el('ng_prov').value),tipo:fix(el('ng_tipo').value),glosa:fix(el('ng_glosa').value),monto:parseInt(el('ng_monto').value)||0,fecha:el('ng_fecha').value||today(),recurrente:el('ng_rec').checked,prorrateo:el('ng_pro').checked,banco:'Itaú Chile',pagado:true};
 if(!row.proveedor){alert('Proveedor.');return;}
 try{await sb.from('gastos').insert(row);render();}catch(e){alert(e.message||e);}
}

/* ---------- PAGOS A CONSULTORES ---------- */
async function renderPagos(){
 el('app').innerHTML='<div class="empty">Cargando…</div>';
 try{
  var all=(await sb.from('facturas').select('*')).data||[];
  // ingreso por proyecto (facturas vinculadas); si no hay, usa valor_cierre
  var ingP={};all.forEach(function(f){if(f.proyecto_id)ingP[f.proyecto_id]=(ingP[f.proyecto_id]||0)+vNeto(f);});
  var perCons={};var detalle=[];
  PROY.forEach(function(p){
   var ing=ingP[p.id]!=null?ingP[p.id]:(Number(p.valor_cierre)||0);
   var pool=ing*COSTO_RATE; // bolsa a repartir entre consultores
   (p.asignaciones||[]).forEach(function(a){
    var pct=((a.pct_ejecucion||0)+(a.pct_comercial||0))/100;
    var pago=pool*pct;
    if(pago<=0)return;
    perCons[a.ejecutivo]=(perCons[a.ejecutivo]||0)+pago;
    detalle.push({cons:a.ejecutivo,proy:fix(p.cliente)+' · '+fix(p.cargo),pct:Math.round(pct*100),pago:pago});
   });
  });
  var h='<div class="bar"><span class="hint">Bolsa a consultores:</span><input type="number" value="'+(COSTO_RATE*100)+'" style="width:70px" onchange="COSTO_RATE=(parseFloat(this.value)||0)/100;render()"><span class="hint">% del ingreso del proyecto (ajustable, caso a caso)</span></div>';
  h+='<div class="hint" style="margin-bottom:8px">Cálculo: por cada proyecto, se reparte el '+(COSTO_RATE*100)+'% del ingreso según el % (ejecución + comercial) de cada consultor. El ingreso sale de las facturas vinculadas; si el proyecto no tiene facturas vinculadas, usa el valor de cierre.</div>';
  var consKeys=Object.keys(perCons).sort(function(a,b){return perCons[b]-perCons[a];});
  h+='<div class="sec">Total a pagar por consultor</div><div class="card"><table><thead><tr><th>Consultor</th><th class="r">A pagar</th></tr></thead><tbody>';
  if(!consKeys.length)h+='<tr><td colspan=2 class="empty">Aún no hay proyectos con reparto. Vienen desde Operación (Entró → Proyecto).</td></tr>';
  consKeys.forEach(function(k){h+='<tr><td><span class="tag" style="background:'+ecolor(k)+'">'+esc(k)+'</span></td><td class="r"><b>'+M(perCons[k])+'</b></td></tr>';});
  h+='</tbody></table></div>';
  if(detalle.length){
   h+='<div class="sec">Detalle por proyecto</div><div class="card"><table><thead><tr><th>Consultor</th><th>Proyecto</th><th class="r">%</th><th class="r">A pagar</th></tr></thead><tbody>';
   detalle.sort(function(a,b){return b.pago-a.pago;}).forEach(function(d){h+='<tr><td>'+esc(d.cons)+'</td><td class="muted">'+esc(d.proy)+'</td><td class="r">'+d.pct+'%</td><td class="r">'+M(d.pago)+'</td></tr>';});
   h+='</tbody></table></div>';
  }
  el('app').innerHTML=h;
 }catch(e){el('app').innerHTML='<div class="card"><div class="empty neg">Error: '+esc(e.message||e)+'</div></div>';}
}

function waitSDK(ms){return new Promise(function(r){var t=Date.now();(function c(){if(window.supabase&&window.supabase.createClient)return r(true);if(Date.now()-t>ms)return r(false);setTimeout(c,80);})();});}
(async function(){var ok=await waitSDK(8000);if(!ok){el('root').innerHTML='<div class="card login"><div class="empty neg">No cargó la librería. Recarga.</div></div>';return;}sb=window.supabase.createClient(SUPA_URL,SUPA_ANON);await boot();})();
