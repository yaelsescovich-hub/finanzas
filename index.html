function esAnulado(f){var e=(f.estado||'').toLowerCase();return e.indexOf('anul')>=0||e.indexOf('null')>=0;}
function _numB(v){if(v==null)return 0;var s=String(v).replace(/[^0-9\-]/g,'');return s===''||s==='-'?0:parseInt(s,10);}
function _anioB(f){var s=String(f||'');var m=s.match(/(\d{4})-(\d{2})-(\d{2})/);if(m)return m[1];m=s.match(/(\d{2})\/(\d{2})\/(\d{4})/);if(m)return m[3];return (s.slice(0,4).match(/^\d{4}$/)?s.slice(0,4):'');}
function _fechaISO(f){var s=String(f||'');var m=s.match(/(\d{4})-(\d{2})-(\d{2})/);if(m)return m[1]+'-'+m[2]+'-'+m[3];m=s.match(/(\d{2})\/(\d{2})\/(\d{4})/);if(m)return m[3]+'-'+m[2]+'-'+m[1];return s.slice(0,10);}
function _tipoDTE(code){code=parseInt(code,10);if(code===61)return 'nc';if(code===56)return 'nd';if(code===34||code===41)return 'exenta';return 'factura';}
function _tipoTxt(doc){var d=(doc||'').toLowerCase();if(d.indexOf('cr')>=0&&d.indexOf('nota')>=0)return 'nc';if(d.indexOf('d\u00e9bito')>=0||d.indexOf('debito')>=0)return 'nd';if(d.indexOf('exenta')>=0)return 'exenta';return 'factura';}
function _htmlToRows(text){var doc=new DOMParser().parseFromString(text,'text/html');var trs=doc.querySelectorAll('tr');var rows=[];trs.forEach(function(tr){var cells=[];tr.querySelectorAll('td,th').forEach(function(td){cells.push((td.textContent||'').trim());});if(cells.length)rows.push(cells);});return rows;}
function _colIdx(headerRow,names){var idx={};headerRow.forEach(function(h,j){var hn=String(h||'').toLowerCase().replace(/\s|\./g,'');for(var n in names){if(names[n].indexOf(hn)>=0)idx[n]=j;}});return idx;}
function _dteFromRows(aoa){
  // busca fila de encabezado con 'TipoDTE'
  var hi=-1;for(var i=0;i<aoa.length;i++){if(aoa[i].some(function(c){return String(c).trim()==='TipoDTE';})){hi=i;break;}}
  if(hi<0)return [];
  var map=_colIdx(aoa[hi],{tipo:['tipodte'],folio:['folio'],fecha:['fechaemision','fechaemisi\u00f3n'],neto:['total-neto','totalneto'],ex:['total-exento','totalexento'],iva:['total-iva','totaliva'],total:['total-montototal','totalmontototal'],rut:['rutreceptor'],razon:['razonsocialreceptor','razonsocialrecept']});
  var out=[];
  for(var r=hi+1;r<aoa.length;r++){var row=aoa[r];var t=String(row[map.tipo]||'').trim().replace('.0','');
    if(!/^\d+$/.test(t)||parseInt(t,10)<33)continue; // salta DETALLE y \u00edtems
    var neto=_numB(row[map.neto])+_numB(row[map.ex]);var bruto=_numB(row[map.total]);var tipo=_tipoDTE(t);
    var _fo=String(row[map.folio]||'').replace('.0','');var _an=_anioB(row[map.fecha]);out.push({id:'F'+_an+'-'+tipo+'-'+_fo,folio:_fo,tipo:tipo,fecha:_fechaISO(row[map.fecha]),cliente:String(row[map.razon]||'').trim(),rut:String(row[map.rut]||'').trim(),monto_total:bruto,neto:neto,signo:(tipo==='nc'?-1:1),estado:'Emitido',anio:_anioB(row[map.fecha])});
  }
  return out;
}
function _parseCSV(text){var lines=text.split(/\r?\n/).filter(function(l){return l.trim()!=='';});if(!lines.length)return [];
  function split(l){var res=[],cur='',q=false;for(var i=0;i<l.length;i++){var c=l[i];if(c==='"'){if(q&&l[i+1]==='"'){cur+='"';i++;}else q=!q;}else if(c===','&&!q){res.push(cur);cur='';}else cur+=c;}res.push(cur);return res;}
  var hdr=split(lines[0]);var rows=[];for(var i=1;i<lines.length;i++){var cells=split(lines[i]);var o={};hdr.forEach(function(h,j){o[h.trim()]=(cells[j]||'').trim();});rows.push(o);}return rows;}
function _pick(row,names){for(var i=0;i<names.length;i++){for(var k in row){if(k.toLowerCase().replace(/\s|\./g,'')===names[i])return row[k];}}return '';}
function _rowsToDocs(rows){var out=[];rows.forEach(function(r){var folio=_pick(r,['folio']);if(folio===''||folio==null)return;
  var doc=_pick(r,['documento','tipodedocumento','tipo']);var tipo=_tipoTxt(doc);
  var netoCol=_pick(r,['neto','total-neto','totalneto']);var brutoCol=_pick(r,['bruto','total','montototal','total-montototal','monto']);
  var bruto=_numB(brutoCol);var neto=netoCol!==''?_numB(netoCol):(tipo==='exenta'?bruto:Math.round(bruto/1.19));
  var _f2=String(folio).replace(/\.0$/,'');var _a2=_anioB(_pick(r,['fecha','emision','emisión']));out.push({id:'F'+_a2+'-'+tipo+'-'+_f2,folio:_f2,tipo:tipo,fecha:_fechaISO(_pick(r,['fecha','emision','emisi\u00f3n'])),cliente:String(_pick(r,['raz\u00f3nsocial','razonsocial','cliente','nombre'])||'').trim(),rut:String(_pick(r,['rut','receptor'])||'').trim(),monto_total:bruto,neto:neto,signo:(tipo==='nc'?-1:1),estado:String(_pick(r,['estado'])||'Emitido').trim(),anio:_anioB(_pick(r,['fecha','emision','emisi\u00f3n']))});});return out;}
async function _leerDocs(f){
  var text='';try{text=await f.text();}catch(e){}
  if(text.indexOf('<table')>=0||text.indexOf('<TABLE')>=0||text.indexOf('<html')>=0){return _dteFromRows(_htmlToRows(text));}
  if(/\.csv$/i.test(f.name)){return _rowsToDocs(_parseCSV(text));}
  var buf=await f.arrayBuffer();var wb=XLSX.read(buf,{type:'array'});var sh=wb.Sheets[wb.SheetNames[0]];
  var aoa=XLSX.utils.sheet_to_json(sh,{header:1,defval:''});var d=_dteFromRows(aoa);
  if(d.length)return d;return _rowsToDocs(XLSX.utils.sheet_to_json(sh,{defval:''}));
}

 var ov=document.getElementById('__impov');
 if(!ov){ov=document.createElement('div');ov.id='__impov';ov.style.cssText='position:fixed;inset:0;z-index:2147483000;background:rgba(10,12,30,.55);display:flex;align-items:center;justify-content:center;font-family:Arial,Helvetica,sans-serif';document.body.appendChild(ov);}

var ABLINK={},CGCAT={};
function _movsFromRows(aoa){
  var anio='';
  for(var i=0;i<aoa.length;i++){for(var j=0;j<aoa[i].length;j++){var mm=String(aoa[i][j]).match(/(\d{2})\/(\d{2})\/(\d{4})\s*-\s*(\d{2})\/(\d{2})\/(\d{4})/);if(mm){anio=mm[3];}}}
  var hi=-1;for(var i=0;i<aoa.length;i++){var r=aoa[i];if(r.some(function(c){return String(c).trim()==='Fecha';})&&r.some(function(c){return String(c).indexOf('sito')>=0||String(c).indexOf('bono')>=0;})){hi=i;break;}}
  if(hi<0)return [];
  var H=aoa[hi];function find(f){for(var j=0;j<H.length;j++){if(f(String(H[j])))return j;}return -1;}
  var iFe=find(function(s){return s.trim()==='Fecha';});var iDe=find(function(s){return s.indexOf('Descrip')>=0;});
  var iDep=find(function(s){return s.indexOf('sito')>=0||s.indexOf('bono')>=0;});var iGir=find(function(s){return s.indexOf('iro')>=0||s.indexOf('argo')>=0;});
  var out=[];
  for(var r=hi+1;r<aoa.length;r++){var row=aoa[r];var fe=String(row[iFe]||'').trim();var m=fe.match(/^(\d{2})\/(\d{2})/);if(!m)continue;
    var dep=_numB(row[iDep]);var gir=_numB(row[iGir]);var desc=String(row[iDe]||'').trim();var y=anio||('20'+m[0].slice(0,0));var fecha=(anio||'2026')+'-'+m[2]+'-'+m[1];
    if(dep>0)out.push({id:'M'+fecha.replace(/-/g,'')+'-'+r,fecha:fecha,descripcion:desc,monto:dep,tipo:'abono',anio:(anio||'2026'),conciliado:false});
    else if(gir>0)out.push({id:'M'+fecha.replace(/-/g,'')+'-'+r,fecha:fecha,descripcion:desc,monto:gir,tipo:'cargo',anio:(anio||'2026'),conciliado:false});
  }
  return out;
}

  if(d.indexOf('previred')>=0)return 'Imposiciones';
  if(d.indexOf('valor agregado')>=0||d.indexOf('f29')>=0||(d.indexOf('sii')>=0)||(d.indexOf('impuesto')>=0))return 'Impuesto';

async function renderBanco(){
 el('app').innerHTML='<div class="empty">Cargando conciliación…</div>';
 try{
  var movs=(await sb.from('movimientos').select('*').order('fecha',{ascending:false})).data||[];
  var fac=(await sb.from('facturas').select('*')).data||[];
  var facts=fac.filter(function(f){return f.tipo==='factura'||f.tipo==='exenta';});window.__facCache=facts;
  var anios=[].concat(movs.map(function(m){return m.anio;})).filter(function(v,i,a){return v&&a.indexOf(v)===i;}).sort();
  if(!YR&&anios.length)YR=String(anios[anios.length-1]);
  var ym=movs.filter(function(m){return !YR||String(m.anio)===String(YR);});
  var abonos=ym.filter(function(m){return m.tipo==='abono';});
  var cargos=ym.filter(function(m){return m.tipo==='cargo';});
  var num=function(x){return Number(x)||0;};
  var esRech=function(m){return m.estado==='rechazado';};
  var abPend=abonos.filter(function(m){return !m.conciliado&&!esRech(m);});
  var abTot=abPend.reduce(function(s,m){return s+num(m.monto);},0);

async function aprobarIngreso(movId){
 if(!IS_ADMIN)return;var fid=ABLINK[movId];
 if(!fid){var m=(await sb.from('movimientos').select('monto').eq('id',movId).single()).data;var c=(await sb.from('facturas').select('id').eq('monto_total',m.monto).eq('ingreso_autorizado',false)).data||[];
   if(c.length===1)fid=c[0].id;else if(c.length>1){alert('Hay '+c.length+' facturas con ese mismo monto. Elige cuál en el desplegable antes de aprobar.');return;}}
 if(!fid){alert('Enlaza una factura primero (o el monto no calza con ninguna).');return;}
 try{await sb.from('facturas').update({ingreso_autorizado:true,estado_pago:'cobrado'}).eq('id',fid);
  await sb.from('movimientos').update({conciliado:true,factura_id:fid}).eq('id',movId);
  delete ABLINK[movId];renderBanco();}catch(e){alert('No se pudo: '+(e.message||e));}
}
async function desconciliar(movId){
 if(!IS_ADMIN)return;
 try{var m=(await sb.from('movimientos').select('factura_id').eq('id',movId).single()).data;
  if(m&&m.factura_id){await sb.from('facturas').update({ingreso_autorizado:false,estado_pago:'por_cobrar'}).eq('id',m.factura_id);}
  await sb.from('movimientos').update({conciliado:false,factura_id:null}).eq('id',movId);renderBanco();}catch(e){alert(e.message||e);}
}
async function conciliarAuto(){
 if(!IS_ADMIN)return;
 try{
  var movs=(await sb.from('movimientos').select('*').eq('tipo','abono')).data||[];
  var pend=movs.filter(function(m){return !m.conciliado&&m.estado!=='rechazado'&&(!YR||String(m.anio)===String(YR));});
  var fac=(await sb.from('facturas').select('*').or('tipo.eq.factura,tipo.eq.exenta')).data||[];
  var libres=fac.filter(function(f){return !f.ingreso_autorizado;});
  var num=function(x){return Number(x)||0;};
  // agrupar facturas libres por bruto
  var byB={};libres.forEach(function(f){(byB[num(f.monto_total)]=byB[num(f.monto_total)]||[]).push(f);});
  var hechos=0,ambig=0;
  for(var i=0;i<pend.length;i++){var m=pend[i];var cand=byB[num(m.monto)]||[];
    if(cand.length===1){var f=cand.shift();
      await sb.from('facturas').update({ingreso_autorizado:true,estado_pago:'cobrado'}).eq('id',f.id);
      await sb.from('movimientos').update({conciliado:true,factura_id:f.id}).eq('id',m.id);hechos++;
    }else if(cand.length>1){ambig++;}}
  alert('Conciliación automática lista.\n\n'+hechos+' ingresos aprobados por match único.\n'+ambig+' quedaron para que elijas a mano (varias facturas con el mismo monto).\nEl resto no calzó con ninguna factura.');
  renderBanco();
 }catch(e){alert('No se pudo: '+(e.message||e));}
}
async function rechazarMov(movId){if(!IS_ADMIN)return;try{await sb.from('movimientos').update({estado:'rechazado',conciliado:false}).eq('id',movId);renderBanco();}catch(e){alert('No se pudo: '+(e.message||e));}}
async function reactivarMov(movId){if(!IS_ADMIN)return;try{var m=(await sb.from('movimientos').select('factura_id,gasto_id').eq('id',movId).single()).data;if(m&&m.factura_id){await sb.from('facturas').update({ingreso_autorizado:false,estado_pago:'por_cobrar'}).eq('id',m.factura_id);}if(m&&m.gasto_id){await sb.from('gastos').delete().eq('id',m.gasto_id);}await sb.from('movimientos').update({estado:null,conciliado:false,factura_id:null,gasto_id:null}).eq('id',movId);renderBanco();}catch(e){alert('No se pudo: '+(e.message||e));}}
async function cargoAGasto(movId){
 if(!IS_ADMIN)return;
 try{var m=(await sb.from('movimientos').select('*').eq('id',movId).single()).data;
  var cat=CGCAT[movId]||catCargo(m.descripcion);
  var g={id:'G'+Date.now(),proveedor:m.descripcion,tipo:cat,glosa:'Desde cartola',monto:m.monto,fecha:m.fecha,fecha_pago:m.fecha,anio:m.anio,pagado:true,cerrado:false,banco:'Itaú Chile'};

var BACKUP_APP='finanzas';var BACKUP_LABEL='Financiero';var BACKUP_TABLES=['facturas','gastos','proyectos','ejecutivos'];
/* ===================== RESPALDO 4TMS ===================== */
function _stampB(){var d=new Date();function p(n){return (n<10?'0':'')+n;}return d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())+'-'+p(d.getHours())+p(d.getMinutes());}
function _bajarB(nombre,contenido,tipo){var blob=(contenido instanceof Blob)?contenido:new Blob([contenido],{type:tipo||'application/octet-stream'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=nombre;a.click();setTimeout(function(){URL.revokeObjectURL(a.href);},5000);}
async function _dumpTablaB(t){var rows=[],from=0,P=1000;while(true){var r=await sb.from(t).select('*').range(from,from+P-1);if(r.error)return {__error:r.error.message};var d=r.data||[];rows=rows.concat(d);if(d.length<P)break;from+=P;}return rows;}
async function exportarRespaldoDatos(btn){
 if(typeof IS_ADMIN!=='undefined'&&!IS_ADMIN){alert('Solo el administrador puede exportar el respaldo.');return;}
 var lbl=btn?btn.textContent:'';if(btn)btn.disabled=true;
 try{var out={_app:BACKUP_APP,_fecha:new Date().toISOString(),tablas:{}};var res=[];
  for(var i=0;i<BACKUP_TABLES.length;i++){var t=BACKUP_TABLES[i];if(btn)btn.textContent='Respaldando '+t+'…';var data=await _dumpTablaB(t);out.tablas[t]=data;res.push(t+': '+((data&&data.__error)?('ERROR '+data.__error):(data.length+' filas')));}
  _bajarB('respaldo-'+BACKUP_APP+'-'+_stampB()+'.json',JSON.stringify(out),'application/json');
  alert('Respaldo de datos listo.\n\n'+res.join('\n'));
 }catch(e){alert('Error en el respaldo: '+(e.message||e));}
 finally{if(btn){btn.disabled=false;btn.textContent=lbl||'Bajar datos (JSON)';}}
}

/* ---------- COBRANZA ---------- */
var CE='por_cobrar';
async function renderCobranza(){
 el('app').innerHTML='<div class="empty">Cargando cobranza…</div>';
 try{
  var all=(await sb.from('facturas').select('*')).data||[];
  var docs=all.filter(function(f){return f.tipo==='factura'||f.tipo==='exenta';}); // cobranza sobre facturas
  var yfx=docs.filter(function(f){return !YR||String(f.anio)===String(YR);});
  var anios=[].concat(all.map(function(f){return f.anio;})).filter(function(v,i,a){return v&&a.indexOf(v)===i;}).sort();
  var suma=function(a){return a.reduce(function(s,f){return s+(Number(f.monto_total)||0);},0);};
  var cobrado=yfx.filter(function(f){return f.estado_pago==='cobrado';});
  var porc=yfx.filter(function(f){return f.estado_pago==='por_cobrar';});
  var venc=yfx.filter(function(f){return f.estado_pago==='vencida';});

  var h='<div class="bar">'+yrSel(anios)+'</div>';
  h+='<div class="hint" style="margin-bottom:8px">El estado de pago no venía en el respaldo (salía de Duemint/Itaú). Todas parten como <b>por cobrar</b>; márcalas cobradas a medida que concilias, o subimos la cartola Itaú para automatizarlo.</div>';
  h+='<div class="kpis"><div class="kpi g"><div class="l">Cobrado (con IVA)</div><div class="v">'+M(suma(cobrado))+'</div></div>'
   +'<div class="kpi m"><div class="l">Por cobrar</div><div class="v">'+M(suma(porc))+'</div></div>'
   +'<div class="kpi r"><div class="l">Vencido</div><div class="v">'+M(suma(venc))+'</div></div>'
   +'<div class="kpi n"><div class="l">Documentos</div><div class="v">'+yfx.length+'</div></div></div>';

  // aging de por cobrar
  var band={a:0,b:0,c:0,d:0};var now=new Date();
  porc.concat(venc).forEach(function(f){var dias=Math.round((now-new Date(f.fecha))/86400000);var m=Number(f.monto_total)||0;if(dias<=30)band.a+=m;else if(dias<=60)band.b+=m;else if(dias<=90)band.c+=m;else band.d+=m;});
  h+='<div class="sec">Antigüedad de lo pendiente</div><div class="card"><table><thead><tr><th>Tramo</th><th class="r">Monto</th></tr></thead><tbody>'
   +'<tr><td>0–30 días</td><td class="r">'+M(band.a)+'</td></tr><tr><td>31–60 días</td><td class="r">'+M(band.b)+'</td></tr>'
   +'<tr><td>61–90 días</td><td class="r">'+M(band.c)+'</td></tr><tr><td class="neg">+90 días</td><td class="r neg">'+M(band.d)+'</td></tr></tbody></table></div>';

  // tabla marcable
  var filtro=yfx.filter(function(f){return f.estado_pago===CE;}).sort(function(a,b){return String(a.fecha||'').localeCompare(String(b.fecha||''));});
  h+='<div class="bar"><span class="hint">Ver:</span><span class="tog"><button class="'+(CE==='por_cobrar'?'on':'')+'" onclick="CE=\'por_cobrar\';render()">Por cobrar</button><button class="'+(CE==='cobrado'?'on':'')+'" onclick="CE=\'cobrado\';render()">Cobradas</button><button class="'+(CE==='vencida'?'on':'')+'" onclick="CE=\'vencida\';render()">Vencidas</button></span></div>';
  h+='<div class="card"><table><thead><tr><th>Fecha</th><th>Folio</th><th>Cliente</th><th class="r">Con IVA</th><th>Marcar</th></tr></thead><tbody>';
  if(!filtro.length)h+='<tr><td colspan=5 class="empty">Sin documentos en este estado.</td></tr>';
  filtro.slice(0,300).forEach(function(f){
   h+='<tr><td class="muted">'+esc(String(f.fecha||'').slice(0,10))+'</td><td>'+esc(f.folio||'')+'</td><td><b>'+esc2(f.cliente)+'</b></td><td class="r">'+M(f.monto_total)+'</td>'
    +'<td><select onchange="marcarPago(\''+esc(f.id)+'\',this.value)"><option value="por_cobrar"'+(f.estado_pago==='por_cobrar'?' selected':'')+'>Por cobrar</option><option value="cobrado"'+(f.estado_pago==='cobrado'?' selected':'')+'>Cobrada</option><option value="vencida"'+(f.estado_pago==='vencida'?' selected':'')+'>Vencida</option></select></td></tr>';
  });
  h+='</tbody></table></div>';
  el('app').innerHTML=h;
 }catch(e){el('app').innerHTML='<div class="card"><div class="empty neg">Error: '+esc(e.message||e)+'</div></div>';}
}
async function marcarPago(id,estado){try{var u={estado_pago:estado};if(estado==='cobrado')u.fecha_pago=today();await sb.from('facturas').update(u).eq('id',id);render();}catch(e){alert(e.message||e);}}

/* ---------- RESULTADOS / MÁRGENES ---------- */
async function renderResultados(){
 el('app').innerHTML='<div class="empty">Cargando resultados…</div>';
 try{
  var all=(await sb.from('facturas').select('*')).data||[];
  var gas=(await sb.from('gastos').select('*')).data||[];
  var anios=[].concat(all.map(function(f){return f.anio;})).filter(function(v,i,a){return v&&a.indexOf(v)===i;}).sort();
  if(!YR&&anios.length)YR=String(anios[anios.length-1]);
  var yfx=all.filter(function(f){return (!YR||String(f.anio)===String(YR))&&!esAnulado(f);});
  var num=function(x){return Number(x)||0;};
  var ingreso=yfx.reduce(function(s,f){return s+vNeto(f);},0);
  var ygas=gas.filter(function(g){return (!YR||String(g.anio||String(g.fecha||'').slice(0,4))===String(YR))&&g.pagado;});
  var gastoTot=ygas.reduce(function(s,g){return s+num(g.monto);},0);
  var ganancia=ingreso-gastoTot;
  var mg=ingreso?(ganancia/ingreso*100):0;
  // gasto asignado a cada proyecto (prorrateo real + directo)
  var gastoProy={};
  ygas.forEach(function(g){var rep=g.reparto?(typeof g.reparto==='string'?JSON.parse(g.reparto):g.reparto):null;
    if(rep&&rep.items&&rep.items.length){rep.items.forEach(function(it){var amt=(rep.modo==='%')?num(g.monto)*num(it.valor)/100:num(it.valor);gastoProy[it.proyecto_id]=(gastoProy[it.proyecto_id]||0)+amt;});}
    else if(g.proyecto_id){gastoProy[g.proyecto_id]=(gastoProy[g.proyecto_id]||0)+num(g.monto);}});
  var h='<div class="bar">'+ivaTog()+yrSel(anios)+'</div>';
  h+='<div class="hint" style="margin-bottom:8px">Ganancia 4TMS = ingreso neto (sin anulados, NC descontadas) − gastos pagados. Los pagos a consultores viven en Gastos (Sueldo / Boleta), así que ya están incluidos.</div>';
  h+='<div class="kpis"><div class="kpi g"><div class="l">Ingreso neto '+(YR||'total')+'</div><div class="v">'+M(ingreso)+'</div></div>'
   +'<div class="kpi r"><div class="l">Gastos pagados</div><div class="v">'+M(gastoTot)+'</div></div>'
   +'<div class="kpi '+(ganancia<0?'r':'g')+'"><div class="l">Ganancia 4TMS</div><div class="v">'+M(ganancia)+'</div></div>'
   +'<div class="kpi n"><div class="l">Margen</div><div class="v">'+mg.toFixed(1)+'%</div></div></div>';
  // por línea de negocio (T)
  var byl={};yfx.forEach(function(f){var k=f.linea||'(sin T)';byl[k]=(byl[k]||0)+vNeto(f);});
  h+='<div class="sec">Ingreso por línea de negocio (T)</div><div class="card"><table><thead><tr><th>Línea</th><th class="r">Neto</th><th class="r">% del total</th></tr></thead><tbody>';
  Object.keys(byl).sort(function(a,b){return byl[b]-byl[a];}).forEach(function(k){h+='<tr><td><b>'+esc(k)+'</b></td><td class="r">'+M(byl[k])+'</td><td class="r">'+(ingreso?(byl[k]/ingreso*100).toFixed(1):'0')+'%</td></tr>';});
  h+='</tbody></table></div>';
  // rentabilidad por proyecto (ingreso - gasto asignado)
  var byp={};yfx.forEach(function(f){if(f.proyecto_id){byp[f.proyecto_id]=(byp[f.proyecto_id]||0)+vNeto(f);}});
  var keys=Object.keys(byp);
  h+='<div class="sec">Rentabilidad por proyecto</div><div class="card">';
  if(!keys.length)h+='<div class="empty">Aún no hay facturas vinculadas a proyectos. Vincula en el Libro (columna Proyecto) para ver rentabilidad por proyecto.</div>';
  else{h+='<table><thead><tr><th>Proyecto</th><th class="r">Ingreso</th><th class="r">Gasto</th><th class="r">Utilidad</th><th class="r">%</th></tr></thead><tbody>';
   keys.map(function(k){return {k:k,ing:byp[k],gas:gastoProy[k]||0};}).sort(function(a,b){return (b.ing-b.gas)-(a.ing-a.gas);}).forEach(function(x){var u=x.ing-x.gas;var p=x.ing?(u/x.ing*100):0;h+='<tr><td><b>'+esc2(proyName(x.k)||('#'+x.k))+'</b></td><td class="r">'+M(x.ing)+'</td><td class="r">'+M(x.gas)+'</td><td class="r'+(u<0?' neg':'')+'">'+M(u)+'</td><td class="r">'+p.toFixed(0)+'%</td></tr>';});
   h+='</tbody></table>';}
  h+='</div>';
  el('app').innerHTML=h;
 }catch(e){el('app').innerHTML='<div class="card"><div class="empty neg">Error: '+esc(e.message||e)+'</div></div>';}
}

 var GREP=[];
 async function formGasto(id){
  if(!IS_ADMIN){alert('Solo tú puedes editar gastos.');return;}
  var g={};
  if(id){try{g=(await sb.from('gastos').select('*').eq('id',id).single()).data||{};}catch(e){}}
  if(g.cerrado){alert('Este gasto está cerrado. Ábrelo primero para editar.');return;}
  GREP=[];var rep=g.reparto?(typeof g.reparto==='string'?JSON.parse(g.reparto):g.reparto):null;
  var repMode=(rep&&rep.modo)||'$';
  if(rep&&rep.items)rep.items.forEach(function(it){GREP.push({proyecto_id:it.proyecto_id,valor:it.valor});});
  var clas=['Fijo','Sueldo','Boleta Honorarios','Impuesto','Externalización de servicio','Marketing','Licencias','Bancario','Otro'];
  window.__gmode=repMode;
  var h='<div class="card" style="max-width:600px;margin:0 auto"><div class="sec" style="margin-top:0">'+(id?'Editar gasto':'Nuevo gasto')+'</div>'
   +'<div class="bar"><input id="ng_prov" placeholder="Proveedor" style="flex:1" value="'+esc(fix(g.proveedor||''))+'"><select id="ng_tipo" style="width:190px">'+clas.map(function(c){return '<option'+(g.tipo===c?' selected':'')+'>'+c+'</option>';}).join('')+'</select></div>'
   +'<div class="bar"><input id="ng_glosa" placeholder="Glosa / descripción" style="flex:1" value="'+esc(fix(g.glosa||''))+'"></div>'
   +'<div class="bar"><input id="ng_monto" type="number" placeholder="Monto" style="width:150px" value="'+(g.monto||'')+'" oninput="grepTot()"><label class="hint">Emisión <input id="ng_fecha" type="date" value="'+(g.fecha?String(g.fecha).slice(0,10):today())+'" style="width:auto"></label><label class="hint">Vence <input id="ng_venc" type="date" value="'+(g.fecha_pago?String(g.fecha_pago).slice(0,10):'')+'" style="width:auto"></label></div>'
   +'<div class="bar"><label class="hint"><input type="checkbox" id="ng_rec" style="width:auto"'+(g.recurrente?' checked':'')+'> Recurrente mensual</label><label class="hint"><input type="checkbox" id="ng_pag" style="width:auto"'+(g.pagado?' checked':'')+'> Ya pagado</label></div>'
   +'<div class="sec">Prorrateo a proyectos <span class="hint">(mínimo 1 si aplica, máximo 5)</span></div>'
   +'<div class="bar"><span class="hint">Dividir por:</span><span class="tog"><button type="button" id="gm_m" class="'+(repMode==='$'?'on':'')+'" onclick="grepMode(\'$\')">Monto $</button><button type="button" id="gm_p" class="'+(repMode==='%'?'on':'')+'" onclick="grepMode(\'%\')">Porcentaje %</button></span> <button class="btn ghost sm" type="button" onclick="grepAdd()">+ proyecto</button></div>'
   +'<div id="grep_rows"></div><div id="grep_tot" class="hint" style="margin-top:4px"></div>'
   +'<div style="text-align:right;margin-top:12px"><button class="btn ghost sm" onclick="render()">Cancelar</button> <button class="btn sm" onclick="saveGasto('+(id?('\''+id+'\''):'null')+')">Guardar</button></div></div>';
  el('app').innerHTML=h;grepRows();
 }
 function grepMode(m){window.__gmode=m;el('gm_m').className=(m==='$'?'on':'');el('gm_p').className=(m==='%'?'on':'');grepTot();}
 function grepAdd(){if(GREP.length>=5){alert('Máximo 5 proyectos.');return;}GREP.push({proyecto_id:'',valor:0});grepRows();}
 function grepDel(i){GREP.splice(i,1);grepRows();}
 function grepSet(i,k,v){GREP[i][k]=(k==='valor')?(parseFloat(v)||0):v;grepTot();}
 function grepRows(){var h='';GREP.forEach(function(r,i){h+='<div style="display:grid;grid-template-columns:1fr 120px 34px;gap:6px;margin-bottom:6px"><select onchange="grepSet('+i+',\'proyecto_id\',this.value)"><option value="">— proyecto —</option>'+PROY.map(function(p){return '<option value="'+p.id+'"'+(String(r.proyecto_id)===String(p.id)?' selected':'')+'>'+esc2(p.cliente)+' · '+esc2(p.cargo)+'</option>';}).join('')+'</select><input type="number" value="'+(r.valor||'')+'" oninput="grepSet('+i+',\'valor\',this.value)" placeholder="'+(window.__gmode==='%'?'%':'$')+'"><button class="btn ghost sm" type="button" onclick="grepDel('+i+')">✕</button></div>';});el('grep_rows').innerHTML=h;grepTot();}
 function grepTot(){if(!el('grep_tot'))return;var monto=parseInt((el('ng_monto')||{}).value)||0;var sum=GREP.reduce(function(s,r){return s+(Number(r.valor)||0);},0);var mode=window.__gmode;var ok,txt;if(!GREP.length){el('grep_tot').innerHTML='Sin prorrateo: el gasto queda a nivel general.';return;}if(mode==='%'){ok=Math.abs(sum-100)<0.5;txt='Suma: <b>'+sum+'%</b>'+(ok?' ✓':' <span style="color:#C0392B">(debe sumar 100%)</span>');}else{ok=Math.abs(sum-monto)<1;txt='Suma: <b>'+M(sum)+'</b> de '+M(monto)+(ok?' ✓':' <span style="color:#C0392B">(debe cerrar en el monto)</span>');}el('grep_tot').innerHTML=txt;}
 async function saveGasto(id){
  if(!IS_ADMIN){alert('Solo tú puedes editar gastos.');return;}
  var prov=fix(el('ng_prov').value),monto=parseInt(el('ng_monto').value)||0;
  if(!prov){alert('Proveedor.');return;}
  if(!monto){alert('Monto.');return;}
  var reparto=null;
  if(GREP.length){var items=GREP.filter(function(r){return r.proyecto_id&&r.valor;});if(items.length){var mode=window.__gmode;var sum=items.reduce(function(s,r){return s+Number(r.valor);},0);if(mode==='%'&&Math.abs(sum-100)>0.5){alert('El prorrateo por % debe sumar 100%.');return;}if(mode==='$'&&Math.abs(sum-monto)>1){alert('El prorrateo por $ debe cerrar en el monto del gasto.');return;}reparto={modo:mode,items:items.map(function(r){return {proyecto_id:parseInt(r.proyecto_id),valor:Number(r.valor)};})};}}
  var row={proveedor:prov,tipo:fix(el('ng_tipo').value),glosa:fix(el('ng_glosa').value),monto:monto,fecha:el('ng_fecha').value||today(),fecha_pago:el('ng_venc').value||null,anio:(el('ng_fecha').value||today()).slice(0,4),recurrente:el('ng_rec').checked,pagado:el('ng_pag').checked,reparto:reparto,banco:'Itaú Chile'};
  try{
    if(id){await sb.from('gastos').update(row).eq('id',id);}
    else{row.id='G'+Date.now();row.cerrado=false;await sb.from('gastos').insert(row);}
    render();
  }catch(e){alert('No se pudo guardar: '+(e.message||e));}
 }
 async function eliminarGasto(id){if(!IS_ADMIN)return;if(!confirm('¿Eliminar este gasto? No se puede deshacer.'))return;try{
  // si vino de un cargo del banco, liberar el movimiento
  try{var mv=(await sb.from('movimientos').select('id').eq('gasto_id',id).limit(1)).data;if(mv&&mv[0]){await sb.from('movimientos').update({conciliado:false,estado:null,gasto_id:null}).eq('id',mv[0].id);}}catch(e){}
  await sb.from('gastos').delete().eq('id',id);renderGastos();
 }catch(e){alert('No se pudo eliminar: '+(e.message||e));}}
 async function togglePagadoG(id,val){if(!IS_ADMIN)return;try{await sb.from('gastos').update({pagado:!val}).eq('id',id);renderGastos();}catch(e){alert('No se pudo: '+(e.message||e));}}
 async function toggleCerradoG(id,val){if(!IS_ADMIN)return;try{await sb.from('gastos').update({cerrado:!val}).eq('id',id);renderGastos();}catch(e){alert('No se pudo: '+(e.message||e));}}

/* ---------- PAGOS A CONSULTORES ---------- */
async function renderPagos(){
 el('app').innerHTML='<div class="empty">Cargando…</div>';
 try{
  var all=(await sb.from('facturas').select('*')).data||[];
  // ingreso por proyecto (facturas vinculadas); si no hay, usa valor_cierre
  var ingP={};all.forEach(function(f){if(f.proyecto_id)ingP[f.proyecto_id]=(ingP[f.proyecto_id]||0)+vNeto(f);});
  var perCons={};var detalle=[];
  PROY.forEach(function(p){
   var ing=ingP[p.id]!=null?ingP[p.id]:(Number(p.valor_cierre)||0);
   var pool=ing*COSTO_RATE; // bolsa a repartir entre consultores
   (p.asignaciones||[]).forEach(function(a){
    var pct=((a.pct_ejecucion||0)+(a.pct_comercial||0))/100;
    var pago=pool*pct;
    if(pago<=0)return;
    perCons[a.ejecutivo]=(perCons[a.ejecutivo]||0)+pago;
    detalle.push({cons:a.ejecutivo,proy:fix(p.cliente)+' · '+fix(p.cargo),pct:Math.round(pct*100),pago:pago});
   });
  });
  var h='<div class="bar"><span class="hint">Bolsa a consultores:</span><input type="number" value="'+(COSTO_RATE*100)+'" style="width:70px" onchange="COSTO_RATE=(parseFloat(this.value)||0)/100;render()"><span class="hint">% del ingreso del proyecto (ajustable, caso a caso)</span></div>';
  h+='<div class="hint" style="margin-bottom:8px">Cálculo: por cada proyecto, se reparte el '+(COSTO_RATE*100)+'% del ingreso según el % (ejecución + comercial) de cada consultor. El ingreso sale de las facturas vinculadas; si el proyecto no tiene facturas vinculadas, usa el valor de cierre.</div>';
  var consKeys=Object.keys(perCons).sort(function(a,b){return perCons[b]-perCons[a];});
  h+='<div class="sec">Total a pagar por consultor</div><div class="card"><table><thead><tr><th>Consultor</th><th class="r">A pagar</th></tr></thead><tbody>';
  if(!consKeys.length)h+='<tr><td colspan=2 class="empty">Aún no hay proyectos con reparto. Vienen desde Operación (Entró → Proyecto).</td></tr>';
  consKeys.forEach(function(k){h+='<tr><td><span class="tag" style="background:'+ecolor(k)+'">'+esc(k)+'</span></td><td class="r"><b>'+M(perCons[k])+'</b></td></tr>';});
  h+='</tbody></table></div>';
  if(detalle.length){
   h+='<div class="sec">Detalle por proyecto</div><div class="card"><table><thead><tr><th>Consultor</th><th>Proyecto</th><th class="r">%</th><th class="r">A pagar</th></tr></thead><tbody>';
   detalle.sort(function(a,b){return b.pago-a.pago;}).forEach(function(d){h+='<tr><td>'+esc(d.cons)+'</td><td class="muted">'+esc(d.proy)+'</td><td class="r">'+d.pct+'%</td><td class="r">'+M(d.pago)+'</td></tr>';});
   h+='</tbody></table></div>';
  }
  el('app').innerHTML=h;
 }catch(e){el('app').innerHTML='<div class="card"><div class="empty neg">Error: '+esc(e.message||e)+'</div></div>';}
}

function waitSDK(ms){return new Promise(function(r){var t=Date.now();(function c(){if(window.supabase&&window.supabase.createClient)return r(true);if(Date.now()-t>ms)return r(false);setTimeout(c,80);})();});}
(async function(){var ok=await waitSDK(8000);if(!ok){el('root').innerHTML='<div class="card login"><div class="empty neg">No cargó la librería. Recarga.</div></div>';return;}sb=window.supabase.createClient(SUPA_URL,SUPA_ANON);await boot();})();
