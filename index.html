function esAnulado(f){var e=(f.estado||'').toLowerCase();return e.indexOf('anul')>=0||e.indexOf('null')>=0;}
function _numB(v){if(v==null)return 0;var s=String(v).replace(/[^0-9\-]/g,'');return s===''||s==='-'?0:parseInt(s,10);}
function _anioB(f){var s=String(f||'');var m=s.match(/(\d{4})-(\d{2})-(\d{2})/);if(m)return m[1];m=s.match(/(\d{2})\/(\d{2})\/(\d{4})/);if(m)return m[3];return (s.slice(0,4).match(/^\d{4}$/)?s.slice(0,4):'');}
function _fechaISO(f){var s=String(f||'');var m=s.match(/(\d{4})-(\d{2})-(\d{2})/);if(m)return m[1]+'-'+m[2]+'-'+m[3];m=s.match(/(\d{2})\/(\d{2})\/(\d{4})/);if(m)return m[3]+'-'+m[2]+'-'+m[1];return s.slice(0,10);}
function _tipoDTE(code){code=parseInt(code,10);if(code===61)return 'nc';if(code===56)return 'nd';if(code===34||code===41)return 'exenta';return 'factura';}
function _tipoTxt(doc){var d=(doc||'').toLowerCase();if(d.indexOf('cr')>=0&&d.indexOf('nota')>=0)return 'nc';if(d.indexOf('d\u00e9bito')>=0||d.indexOf('debito')>=0)return 'nd';if(d.indexOf('exenta')>=0)return 'exenta';return 'factura';}
function _htmlToRows(text){var doc=new DOMParser().parseFromString(text,'text/html');var trs=doc.querySelectorAll('tr');var rows=[];trs.forEach(function(tr){var cells=[];tr.querySelectorAll('td,th').forEach(function(td){cells.push((td.textContent||'').trim());});if(cells.length)rows.push(cells);});return rows;}
function _colIdx(headerRow,names){var idx={};headerRow.forEach(function(h,j){var hn=String(h||'').toLowerCase().replace(/\s|\./g,'');for(var n in names){if(names[n].indexOf(hn)>=0)idx[n]=j;}});return idx;}
function _dteFromRows(aoa){
  // busca fila de encabezado con 'TipoDTE'
  var hi=-1;for(var i=0;i<aoa.length;i++){if(aoa[i].some(function(c){return String(c).trim()==='TipoDTE';})){hi=i;break;}}
  if(hi<0)return [];
  var map=_colIdx(aoa[hi],{tipo:['tipodte'],folio:['folio'],fecha:['fechaemision','fechaemisi\u00f3n'],neto:['total-neto','totalneto'],ex:['total-exento','totalexento'],iva:['total-iva','totaliva'],total:['total-montototal','totalmontototal'],rut:['rutreceptor'],razon:['razonsocialreceptor','razonsocialrecept']});
  var out=[];
  for(var r=hi+1;r<aoa.length;r++){var row=aoa[r];var t=String(row[map.tipo]||'').trim().replace('.0','');
    if(!/^\d+$/.test(t)||parseInt(t,10)<33)continue; // salta DETALLE y \u00edtems
    var neto=_numB(row[map.neto])+_numB(row[map.ex]);var bruto=_numB(row[map.total]);var tipo=_tipoDTE(t);
    var _fo=String(row[map.folio]||'').replace('.0','');var _an=_anioB(row[map.fecha]);out.push({id:'F'+_an+'-'+tipo+'-'+_fo,folio:_fo,tipo:tipo,fecha:_fechaISO(row[map.fecha]),cliente:String(row[map.razon]||'').trim(),rut:String(row[map.rut]||'').trim(),monto_total:bruto,neto:neto,signo:(tipo==='nc'?-1:1),estado:'Emitido',anio:_anioB(row[map.fecha])});
  }
  return out;
}
function _parseCSV(text){var lines=text.split(/\r?\n/).filter(function(l){return l.trim()!=='';});if(!lines.length)return [];
  function split(l){var res=[],cur='',q=false;for(var i=0;i<l.length;i++){var c=l[i];if(c==='"'){if(q&&l[i+1]==='"'){cur+='"';i++;}else q=!q;}else if(c===','&&!q){res.push(cur);cur='';}else cur+=c;}res.push(cur);return res;}
  var hdr=split(lines[0]);var rows=[];for(var i=1;i<lines.length;i++){var cells=split(lines[i]);var o={};hdr.forEach(function(h,j){o[h.trim()]=(cells[j]||'').trim();});rows.push(o);}return rows;}
function _pick(row,names){for(var i=0;i<names.length;i++){for(var k in row){if(k.toLowerCase().replace(/\s|\./g,'')===names[i])return row[k];}}return '';}
function _rowsToDocs(rows){var out=[];rows.forEach(function(r){var folio=_pick(r,['folio']);if(folio===''||folio==null)return;
  var doc=_pick(r,['documento','tipodedocumento','tipo']);var tipo=_tipoTxt(doc);
  var netoCol=_pick(r,['neto','total-neto','totalneto']);var brutoCol=_pick(r,['bruto','total','montototal','total-montototal','monto']);
  var bruto=_numB(brutoCol);var neto=netoCol!==''?_numB(netoCol):(tipo==='exenta'?bruto:Math.round(bruto/1.19));
  var _f2=String(folio).replace(/\.0$/,'');var _a2=_anioB(_pick(r,['fecha','emision','emisión']));out.push({id:'F'+_a2+'-'+tipo+'-'+_f2,folio:_f2,tipo:tipo,fecha:_fechaISO(_pick(r,['fecha','emision','emisi\u00f3n'])),cliente:String(_pick(r,['raz\u00f3nsocial','razonsocial','cliente','nombre'])||'').trim(),rut:String(_pick(r,['rut','receptor'])||'').trim(),monto_total:bruto,neto:neto,signo:(tipo==='nc'?-1:1),estado:String(_pick(r,['estado'])||'Emitido').trim(),anio:_anioB(_pick(r,['fecha','emision','emisi\u00f3n']))});});return out;}
async function _leerDocs(f){
  var text='';try{text=await f.text();}catch(e){}
  if(text.indexOf('<table')>=0||text.indexOf('<TABLE')>=0||text.indexOf('<html')>=0){return _dteFromRows(_htmlToRows(text));}
  if(/\.csv$/i.test(f.name)){return _rowsToDocs(_parseCSV(text));}
  var buf=await f.arrayBuffer();var wb=XLSX.read(buf,{type:'array'});var sh=wb.Sheets[wb.SheetNames[0]];
  var aoa=XLSX.utils.sheet_to_json(sh,{header:1,defval:''});var d=_dteFromRows(aoa);
  if(d.length)return d;return _rowsToDocs(XLSX.utils.sheet_to_json(sh,{defval:''}));
}

 var ov=document.getElementById('__impov');

     if(!nuevos.length){msg.textContent='Todo ya estaba cargado ('+docs.length+' documentos). Nada nuevo.';this.disabled=false;return;}

     for(var i=0;i<nuevos.length;i+=200){var chunk=nuevos.slice(i,i+200);msg.textContent='Cargando '+Math.min(i+200,nuevos.length)+'/'+nuevos.length+'\u2026';var r=await sb.from('facturas').insert(chunk);if(r.error){err+=chunk.length;}else{ok+=chunk.length;}}

var ABLINK={},CGCAT={};
function _movsFromRows(aoa){
  var anio='';
  for(var i=0;i<aoa.length;i++){for(var j=0;j<aoa[i].length;j++){var mm=String(aoa[i][j]).match(/(\d{2})\/(\d{2})\/(\d{4})\s*-\s*(\d{2})\/(\d{2})\/(\d{4})/);if(mm){anio=mm[3];}}}
  var hi=-1;for(var i=0;i<aoa.length;i++){var r=aoa[i];if(r.some(function(c){return String(c).trim()==='Fecha';})&&r.some(function(c){return String(c).indexOf('sito')>=0||String(c).indexOf('bono')>=0;})){hi=i;break;}}
  if(hi<0)return [];
  var H=aoa[hi];function find(f){for(var j=0;j<H.length;j++){if(f(String(H[j])))return j;}return -1;}
  var iFe=find(function(s){return s.trim()==='Fecha';});var iDe=find(function(s){return s.indexOf('Descrip')>=0;});
  var iDep=find(function(s){return s.indexOf('sito')>=0||s.indexOf('bono')>=0;});var iGir=find(function(s){return s.indexOf('iro')>=0||s.indexOf('argo')>=0;});
  var out=[];
  for(var r=hi+1;r<aoa.length;r++){var row=aoa[r];var fe=String(row[iFe]||'').trim();var m=fe.match(/^(\d{2})\/(\d{2})/);if(!m)continue;
    var dep=_numB(row[iDep]);var gir=_numB(row[iGir]);var desc=String(row[iDe]||'').trim();var y=anio||('20'+m[0].slice(0,0));var fecha=(anio||'2026')+'-'+m[2]+'-'+m[1];
    if(dep>0)out.push({id:'M'+fecha.replace(/-/g,'')+'-'+r,fecha:fecha,descripcion:desc,monto:dep,tipo:'abono',anio:(anio||'2026'),conciliado:false});
    else if(gir>0)out.push({id:'M'+fecha.replace(/-/g,'')+'-'+r,fecha:fecha,descripcion:desc,monto:gir,tipo:'cargo',anio:(anio||'2026'),conciliado:false});
  }
  return out;
}

  for(var i=0;i<pend.length;i++){var m=pend[i];var dep=N(m.monto);
    var det=detectCliente(m.descripcion,facts);
    var pool=det.cliente?facts.filter(function(f){return f.cliente===det.cliente&&saldo(f)>0;}):facts.filter(function(f){return saldo(f)>0;});
    // A) una sola factura calza exacto
    var exact=pool.filter(function(f){return saldo(f)===dep;});
    // B) suma de TODO el saldo del cliente calza
    var sumPool=pool.reduce(function(s,f){return s+saldo(f);},0);
    var target=null;
    if(exact.length===1)target=[exact[0]];
    else if(det.cliente&&pool.length&&Math.abs(sumPool-dep)<1)target=pool;
    if(target){
      for(var k=0;k<target.length;k++){var f=target[k];var mo=Math.min(saldo(f),dep);
        await sb.from('pagos_aplicados').insert({id:'P'+Date.now()+'-'+idc++,movimiento_id:m.id,factura_id:f.id,monto:mo,fecha:m.fecha});
        ap[f.id]=(ap[f.id]||0)+mo;dep-=mo;
        if((ap[f.id]||0)>=N(f.monto_total)){await sb.from('facturas').update({ingreso_autorizado:true,estado_pago:'cobrado'}).eq('id',f.id);}
      }
      await sb.from('movimientos').update({conciliado:true}).eq('id',m.id);hechos++;
    }else if(det.cliente&&pool.length){ambig++;}
  }
  alert('Conciliación automática lista.\n\n'+hechos+' depósitos aplicados solos (calce único o suma del cliente).\n'+ambig+' quedaron para que apliques a mano (cliente con varias combinaciones posibles).\nEl resto no se pudo identificar.');
  renderBanco();
 }catch(e){alert('No se pudo: '+(e.message||e));}
}

function _stampB(){var d=new Date();function p(n){return (n<10?'0':'')+n;}return d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())+'-'+p(d.getHours())+p(d.getMinutes());}

async function _dumpTablaB(t){var rows=[],from=0,P=1000;while(true){var r=await sb.from(t).select('*').range(from,from+P-1);if(r.error)return {__error:r.error.message};var d=r.data||[];rows=rows.concat(d);if(d.length<P)break;from+=P;}return rows;}

 }catch(e){el('app').innerHTML='<div class="card"><div class="empty neg">Error: '+esc(e.message||e)+'</div></div>';}
}
async function renderGastos(){

  try{
   var gas=(await sb.from('gastos').select('*').order('fecha',{ascending:false})).data||[];
   var anios=[].concat(gas.map(function(g){return g.anio||String(g.fecha||'').slice(0,4);})).filter(function(v,i,a){return v&&a.indexOf(v)===i;}).sort();
   if(!YR&&anios.length)YR=String(anios[anios.length-1]);
   var yg=gas.filter(function(g){return !YR||String(g.anio||String(g.fecha||'').slice(0,4))===String(YR);});
   var vg=yg.filter(function(g){return !GF||(GF==='pagado'?g.pagado:GF==='pend'?!g.pagado:GF==='recur'?g.recurrente:true);});

    +'<span class="tog"><button class="'+(!GF?'on':'')+'" onclick="GF=\'\';render()">Todos</button><button class="'+(GF==='pagado'?'on':'')+'" onclick="GF=\'pagado\';render()">Pagados</button><button class="'+(GF==='pend'?'on':'')+'" onclick="GF=\'pend\';render()">Pendientes</button><button class="'+(GF==='recur'?'on':'')+'" onclick="GF=\'recur\';render()">Recurrentes</button></span></div>';
   h+='<div class="kpis"><div class="kpi g"><div class="l">Gasto pagado '+(YR||'')+'</div><div class="v">'+M(pagTot)+'</div></div>'
    +'<div class="kpi r"><div class="l">Pendiente de pago</div><div class="v">'+M(pendTot)+'</div></div>'
    +'<div class="kpi m"><div class="l">Recurrente mensual</div><div class="v">'+M(recTot)+'</div></div>'
    +'<div class="kpi n"><div class="l">Gastos</div><div class="v">'+yg.length+'</div></div></div>';
   h+='<div class="card"><table><thead><tr><th>Fecha</th><th>Proveedor</th><th>Clasificación</th><th>Glosa</th><th>Vence</th><th class="r">Monto</th><th>Proyectos</th><th>¿Pagó?</th><th></th></tr></thead><tbody>';
   if(!vg.length)h+='<tr><td colspan=9 class="empty">Sin gastos.</td></tr>';
   vg.forEach(function(g){
     var rep=g.reparto?(typeof g.reparto==='string'?JSON.parse(g.reparto):g.reparto):null;
     var repTxt=rep&&rep.items&&rep.items.length?(rep.items.length+' proyecto'+(rep.items.length>1?'s':'')):(g.cliente_folio?esc2(g.cliente_folio):'—');
     var cerr=g.cerrado;
     h+='<tr'+(cerr?' style="opacity:.6"':'')+'><td class="muted">'+esc(String(g.fecha||'').slice(0,10))+'</td><td><b>'+esc2(g.proveedor)+'</b></td><td>'+esc(g.tipo||'')+'</td><td class="muted">'+esc2(g.glosa)+'</td>'
      +'<td class="muted">'+(g.fecha_pago?esc(String(g.fecha_pago).slice(0,10)):'—')+'</td>'
      +'<td class="r">'+M(num(g.monto))+'</td>'
      +'<td class="muted">'+repTxt+'</td>'
      +'<td>'+(IS_ADMIN?'<button class="btn ghost sm" style="'+(g.pagado?'background:#6FA52C;color:#fff':'')+'" onclick="togglePagadoG(\''+esc(g.id)+'\','+(g.pagado?'true':'false')+')">'+(g.pagado?'✓ Pagado':'Marcar')+'</button>':(g.pagado?'✓':'—'))+'</td>'
      +'<td>'+(IS_ADMIN?(cerr?'<button class="btn ghost sm" onclick="toggleCerradoG(\''+esc(g.id)+'\',true)">Abrir</button>':'<button class="btn ghost sm" onclick="formGasto(\''+esc(g.id)+'\')">Editar</button> <button class="btn ghost sm" onclick="toggleCerradoG(\''+esc(g.id)+'\',false)">Cerrar</button>')+' <button class="btn ghost sm" style="color:#C0392B" onclick="eliminarGasto(\''+esc(g.id)+'\')">Eliminar</button>' :'')+'</td></tr>';
   });
   h+='</tbody></table></div>';
   el('app').innerHTML=h;
  }catch(e){el('app').innerHTML='<div class="card"><div class="empty neg">Error: '+esc(e.message||e)+'</div></div>';}
 }
 var GREP=[];
 async function formGasto(id){
  if(!IS_ADMIN){alert('Solo tú puedes editar gastos.');return;}
  var g={};
  if(id){try{g=(await sb.from('gastos').select('*').eq('id',id).single()).data||{};}catch(e){}}
  if(g.cerrado){alert('Este gasto está cerrado. Ábrelo primero para editar.');return;}
  GREP=[];var rep=g.reparto?(typeof g.reparto==='string'?JSON.parse(g.reparto):g.reparto):null;
  var repMode=(rep&&rep.modo)||'$';
  if(rep&&rep.items)rep.items.forEach(function(it){GREP.push({proyecto_id:it.proyecto_id,valor:it.valor});});
  var clas=['Fijo','Sueldo','Boleta Honorarios','Impuesto','Externalización de servicio','Marketing','Licencias','Bancario','Otro'];
  window.__gmode=repMode;
  var h='<div class="card" style="max-width:600px;margin:0 auto"><div class="sec" style="margin-top:0">'+(id?'Editar gasto':'Nuevo gasto')+'</div>'
   +'<div class="bar"><input id="ng_prov" placeholder="Proveedor" style="flex:1" value="'+esc(fix(g.proveedor||''))+'"><select id="ng_tipo" style="width:190px">'+clas.map(function(c){return '<option'+(g.tipo===c?' selected':'')+'>'+c+'</option>';}).join('')+'</select></div>'
   +'<div class="bar"><input id="ng_glosa" placeholder="Glosa / descripción" style="flex:1" value="'+esc(fix(g.glosa||''))+'"></div>'
   +'<div class="bar"><input id="ng_monto" type="number" placeholder="Monto" style="width:150px" value="'+(g.monto||'')+'" oninput="grepTot()"><label class="hint">Emisión <input id="ng_fecha" type="date" value="'+(g.fecha?String(g.fecha).slice(0,10):today())+'" style="width:auto"></label><label class="hint">Vence <input id="ng_venc" type="date" value="'+(g.fecha_pago?String(g.fecha_pago).slice(0,10):'')+'" style="width:auto"></label></div>'
   +'<div class="bar"><label class="hint"><input type="checkbox" id="ng_rec" style="width:auto"'+(g.recurrente?' checked':'')+'> Recurrente mensual</label><label class="hint"><input type="checkbox" id="ng_pag" style="width:auto"'+(g.pagado?' checked':'')+'> Ya pagado</label></div>'
   +'<div class="sec">Prorrateo a proyectos <span class="hint">(mínimo 1 si aplica, máximo 5)</span></div>'
   +'<div class="bar"><span class="hint">Dividir por:</span><span class="tog"><button type="button" id="gm_m" class="'+(repMode==='$'?'on':'')+'" onclick="grepMode(\'$\')">Monto $</button><button type="button" id="gm_p" class="'+(repMode==='%'?'on':'')+'" onclick="grepMode(\'%\')">Porcentaje %</button></span> <button class="btn ghost sm" type="button" onclick="grepAdd()">+ proyecto</button></div>'
   +'<div id="grep_rows"></div><div id="grep_tot" class="hint" style="margin-top:4px"></div>'
   +'<div style="text-align:right;margin-top:12px"><button class="btn ghost sm" onclick="render()">Cancelar</button> <button class="btn sm" onclick="saveGasto('+(id?('\''+id+'\''):'null')+')">Guardar</button></div></div>';
  el('app').innerHTML=h;grepRows();
 }
 function grepMode(m){window.__gmode=m;el('gm_m').className=(m==='$'?'on':'');el('gm_p').className=(m==='%'?'on':'');grepTot();}
 function grepAdd(){if(GREP.length>=5){alert('Máximo 5 proyectos.');return;}GREP.push({proyecto_id:'',valor:0});grepRows();}
 function grepDel(i){GREP.splice(i,1);grepRows();}
 function grepSet(i,k,v){GREP[i][k]=(k==='valor')?(parseFloat(v)||0):v;grepTot();}
 function grepRows(){var h='';GREP.forEach(function(r,i){h+='<div style="display:grid;grid-template-columns:1fr 120px 34px;gap:6px;margin-bottom:6px"><select onchange="grepSet('+i+',\'proyecto_id\',this.value)"><option value="">— proyecto —</option>'+PROY.map(function(p){return '<option value="'+p.id+'"'+(String(r.proyecto_id)===String(p.id)?' selected':'')+'>'+esc2(p.cliente)+' · '+esc2(p.cargo)+'</option>';}).join('')+'</select><input type="number" value="'+(r.valor||'')+'" oninput="grepSet('+i+',\'valor\',this.value)" placeholder="'+(window.__gmode==='%'?'%':'$')+'"><button class="btn ghost sm" type="button" onclick="grepDel('+i+')">✕</button></div>';});el('grep_rows').innerHTML=h;grepTot();}
 function grepTot(){if(!el('grep_tot'))return;var monto=parseInt((el('ng_monto')||{}).value)||0;var sum=GREP.reduce(function(s,r){return s+(Number(r.valor)||0);},0);var mode=window.__gmode;var ok,txt;if(!GREP.length){el('grep_tot').innerHTML='Sin prorrateo: el gasto queda a nivel general.';return;}if(mode==='%'){ok=Math.abs(sum-100)<0.5;txt='Suma: <b>'+sum+'%</b>'+(ok?' ✓':' <span style="color:#C0392B">(debe sumar 100%)</span>');}else{ok=Math.abs(sum-monto)<1;txt='Suma: <b>'+M(sum)+'</b> de '+M(monto)+(ok?' ✓':' <span style="color:#C0392B">(debe cerrar en el monto)</span>');}el('grep_tot').innerHTML=txt;}
 async function saveGasto(id){
  if(!IS_ADMIN){alert('Solo tú puedes editar gastos.');return;}
  var prov=fix(el('ng_prov').value),monto=parseInt(el('ng_monto').value)||0;
  if(!prov){alert('Proveedor.');return;}
  if(!monto){alert('Monto.');return;}
  var reparto=null;
  if(GREP.length){var items=GREP.filter(function(r){return r.proyecto_id&&r.valor;});if(items.length){var mode=window.__gmode;var sum=items.reduce(function(s,r){return s+Number(r.valor);},0);if(mode==='%'&&Math.abs(sum-100)>0.5){alert('El prorrateo por % debe sumar 100%.');return;}if(mode==='$'&&Math.abs(sum-monto)>1){alert('El prorrateo por $ debe cerrar en el monto del gasto.');return;}reparto={modo:mode,items:items.map(function(r){return {proyecto_id:parseInt(r.proyecto_id),valor:Number(r.valor)};})};}}
  var row={proveedor:prov,tipo:fix(el('ng_tipo').value),glosa:fix(el('ng_glosa').value),monto:monto,fecha:el('ng_fecha').value||today(),fecha_pago:el('ng_venc').value||null,anio:(el('ng_fecha').value||today()).slice(0,4),recurrente:el('ng_rec').checked,pagado:el('ng_pag').checked,reparto:reparto,banco:'Itaú Chile'};
  try{
    if(id){await sb.from('gastos').update(row).eq('id',id);}
    else{row.id='G'+Date.now();row.cerrado=false;await sb.from('gastos').insert(row);}
    render();
  }catch(e){alert('No se pudo guardar: '+(e.message||e));}
 }
 async function eliminarGasto(id){if(!IS_ADMIN)return;if(!confirm('¿Eliminar este gasto? No se puede deshacer.'))return;try{
  // si vino de un cargo del banco, liberar el movimiento
  try{var mv=(await sb.from('movimientos').select('id').eq('gasto_id',id).limit(1)).data;if(mv&&mv[0]){await sb.from('movimientos').update({conciliado:false,estado:null,gasto_id:null}).eq('id',mv[0].id);}}catch(e){}
  await sb.from('gastos').delete().eq('id',id);renderGastos();
 }catch(e){alert('No se pudo eliminar: '+(e.message||e));}}
 async function togglePagadoG(id,val){if(!IS_ADMIN)return;try{await sb.from('gastos').update({pagado:!val}).eq('id',id);renderGastos();}catch(e){alert('No se pudo: '+(e.message||e));}}
 async function toggleCerradoG(id,val){if(!IS_ADMIN)return;try{await sb.from('gastos').update({cerrado:!val}).eq('id',id);renderGastos();}catch(e){alert('No se pudo: '+(e.message||e));}}

/* ---------- PAGOS A CONSULTORES ---------- */
async function renderPagos(){
 el('app').innerHTML='<div class="empty">Cargando…</div>';
 try{
  var gas=(await sb.from('gastos').select('*')).data||[];
  var pagos=gas.filter(function(g){return g.tipo==='Pago consultor';});
  var anios=[].concat(pagos.map(function(g){return g.anio||String(g.fecha||'').slice(0,4);})).filter(function(v,i,a){return v&&a.indexOf(v)===i;}).sort();
  if(!YR&&anios.length)YR=String(anios[anios.length-1]);
  var yp=pagos.filter(function(g){return !YR||String(g.anio||String(g.fecha||'').slice(0,4))===String(YR);});
  var num=function(x){return Number(x)||0;};
  window.__pagosCons=yp;
  var per={};yp.forEach(function(g){var c=g.consultor||'(sin nombre)';per[c]=per[c]||{tot:0,n:0};per[c].tot+=num(g.monto);per[c].n++;});
  var descuenta=Object.keys(per).filter(function(c){return c!=='4TMS';}).reduce(function(s,c){return s+per[c].tot;},0);
  var casa=per['4TMS']?per['4TMS'].tot:0;
  var h='<div class="bar">'+yrSel(anios)+'<span class="hint">Ciclo: facturas al cliente → el consultor te factura → cuando paga el cliente, se le paga. Aquí van los pagos reales detectados desde la cartola.</span></div>';
  h+='<div class="kpis"><div class="kpi r"><div class="l">Pagado a consultores '+(YR||'')+'</div><div class="v">'+M(descuenta)+'</div></div>'
   +'<div class="kpi n"><div class="l">Consultores</div><div class="v">'+Object.keys(per).filter(function(c){return c!=='4TMS';}).length+'</div></div>'
   +'<div class="kpi m"><div class="l">Parte 4TMS (info, no descuenta)</div><div class="v">'+M(casa)+'</div></div></div>';
  h+='<div class="sec">Pagado por consultor</div><div class="card"><table><thead><tr><th>Consultor</th><th class="r"># pagos</th><th class="r">Total</th><th>Descuenta del revenue</th><th></th></tr></thead><tbody>';
  var keys=Object.keys(per).sort(function(a,b){return per[b].tot-per[a].tot;});
  if(!keys.length)h+='<tr><td colspan=5 class="empty">Aún no hay pagos a consultores. Se etiquetan desde Egresos (clasificación "Consultor: …").</td></tr>';
  keys.forEach(function(c){var e=per[c];var desc=c!=='4TMS';h+='<tr><td><span class="tag" style="background:'+ecolor(c)+'">'+esc(c)+'</span></td><td class="r">'+e.n+'</td><td class="r"><b>'+M(e.tot)+'</b></td><td>'+(desc?'<span class="badge" style="background:#C0392B;color:#fff">Sí resta</span>':'<span class="badge">No — es la casa</span>')+'</td><td><button class="btn ghost sm" onclick="descargarConsultor(\''+esc(c).replace(/'/g,'')+'\')">Descargar</button></td></tr>';});
  h+='</tbody></table></div>';
  h+='<div class="hint" style="margin-top:8px">La parte 4TMS es información para repartir entre los demás; no descuenta del revenue. El resto sí resta, junto con los gastos.</div>';
  el('app').innerHTML=h;
 }catch(e){el('app').innerHTML='<div class="card"><div class="empty neg">Error: '+esc(e.message||e)+'</div></div>';}
}
function descargarConsultor(nombre){
 var yp=(window.__pagosCons||[]).filter(function(g){return (g.consultor||'(sin nombre)')===nombre;});
 var rows=[['Fecha','Detalle','Monto','Pagado']];
 yp.sort(function(a,b){return String(a.fecha||'').localeCompare(String(b.fecha||''));}).forEach(function(g){rows.push([String(g.fecha||'').slice(0,10),(g.proveedor||g.glosa||''),Number(g.monto)||0,g.pagado?'Sí':'No']);});
 var tot=yp.reduce(function(s,g){return s+(Number(g.monto)||0);},0);rows.push(['','TOTAL',tot,'']);
 var csv=rows.map(function(r){return r.map(function(c){return '"'+String(c).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
 var blob=new Blob(['\ufeff'+csv],{type:'text/csv'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='pagos-'+nombre.replace(/\s+/g,'_')+'.csv';a.click();setTimeout(function(){URL.revokeObjectURL(a.href);},4000);
}

function waitSDK(ms){return new Promise(function(r){var t=Date.now();(function c(){if(window.supabase&&window.supabase.createClient)return r(true);if(Date.now()-t>ms)return r(false);setTimeout(c,80);})();});}
